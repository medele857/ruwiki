<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ивенты — МапДев Вики</title>
  <link rel="icon" type="image/jpeg" href="fav.jpg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="wiki-cards.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 0 48px 28px; max-width: 1100px; margin: 0 auto; width: 100%;
      animation: fadeUp .5s ease .2s forwards; opacity: 0;
    }
    .filter-btn {
      font-family: var(--font); font-size: 11px; letter-spacing: .07em;
      padding: 8px 18px; border-radius: 4px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--border2); background: var(--bg3); color: var(--accent);
    }

    /* ── EVENT CARD — square, no border-radius ── */
    .event-card {
      width: 340px; height: 340px;
      border-radius: 0 !important;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      border: 1px solid var(--border2);
      text-decoration: none; color: var(--text);
      animation: cardIn .6s ease forwards; opacity: 0;
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: pointer;
      background: var(--bg2);
    }
    .event-card:nth-child(1) { animation-delay: .1s; }
    .event-card:nth-child(2) { animation-delay: .22s; }
    .event-card:nth-child(3) { animation-delay: .34s; }

    .event-card:hover { transform: translateY(-6px) scale(1.018); box-shadow: 0 0 30px var(--glow), 0 10px 36px rgba(0,0,0,.5); }

    /* card thumbnail area */
    .event-thumb {
      width: 100%; height: 160px;
      object-fit: cover; display: block;
      filter: brightness(.75);
      transition: filter .3s;
      background: var(--bg3);
    }
    .event-card:hover .event-thumb { filter: brightness(.9); }

    /* no-image placeholder for "скоро" card */
    .event-soon-thumb {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, #111 0%, #1a1a2a 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .event-soon-thumb span {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px; color: var(--accent);
      text-align: center; padding: 0 20px;
      line-height: 1.7;
      text-shadow: 0 0 16px var(--glow);
      animation: textPulse2 1.4s ease-in-out infinite alternate;
    }
    @keyframes textPulse2 { from{opacity:.7} to{opacity:1} }

    /* card body */
    .event-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .event-name {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-size: 20px; letter-spacing: .05em; color: var(--text);
    }
    .event-name-soon {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px; color: var(--accent);
      line-height: 1.7;
    }
    .event-desc { font-size: 11px; color: var(--text2); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .event-desc-soon {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: var(--text2); line-height: 1.9;
    }

    /* status badge */
    .event-status {
      margin-top: auto;
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      padding: 6px 0 0;
      border-top: 1px solid var(--border);
    }
    .event-status.ended  { color: #e05555; }
    .event-status.active { color: #55e099; }
    .event-status.soon   {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: var(--accent);
      animation: textPulse2 1.4s ease-in-out infinite alternate;
    }

    @media(max-width:700px){
      .event-card { width:100%; height:auto; min-height:320px; }
      .filter-bar { padding: 0 18px 20px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-logo">
    <img src="medele.png" alt="logo" class="logo-img" id="logoImg">
    <span class="logo-text" id="logoText" data-default="МапДев Вики" data-hover="кто кто?">МапДев Вики</span>
  </div>
  <nav class="header-nav">
    <a href="authors.html"  class="nav-btn" data-sound>Авторы</a>
    <a href="bloggers.html" class="nav-btn" data-sound>Блогеры</a>
    <a href="studios.html"  class="nav-btn" data-sound>Студии</a>
    <a href="events.html"   class="nav-btn" data-sound>Ивенты</a>
  </nav>
  <button class="theme-toggle" id="themeToggle" data-sound><span class="theme-icon">🌙</span></button>
</header>

<div class="wiki-page">
  <div class="wiki-header">
    <h1>Ивенты</h1>
    <p>Текущие и прошедшие события ру мапдев сообщества</p>
  </div>
  <div class="wiki-nav-row">
    <a href="main.html" class="wiki-back-btn" data-sound>← На главную</a>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all"     data-sound>Все</button>
    <button class="filter-btn"        data-filter="active"  data-sound>Текущие</button>
    <button class="filter-btn"        data-filter="ended"   data-sound>Прошедшие</button>
  </div>

  <div class="wiki-divider"></div>

  <div class="cards-grid" id="eventsGrid">

    <!-- EVENT 1: Создание скинчиков — ENDED -->
    <a href="event-skinki.html" class="event-card" data-status="ended" data-sound>
      <img src="skinki_thumb.jpg" class="event-thumb" alt="Создание скинчиков">
      <div class="event-body">
        <div class="event-name">Создание скинчиков</div>
        <div class="event-desc">супер мега ультра хайп дрип ww завоз 67 эщкере ивент.</div>
        <div class="event-status ended">Закончился</div>
      </div>
    </a>

    <!-- EVENT 2: СКОРО -->
    <div class="event-card" data-status="active">
      <div class="event-soon-thumb">
        <span>Скоро<br>начнётся</span>
      </div>
      <div class="event-body">
        <div class="event-name-soon">Скоро начнётся</div>
        <div class="event-desc-soon">Скоро начнётся</div>
        <div class="event-status soon">Скоро начнётся</div>
      </div>
    </div>

  </div>
</div>

<footer class="site-footer">
  <span class="footer-copy">© МапДев Вики — фан-проект</span>
  <a href="https://medele857.github.io/medele/" target="_blank" class="footer-about" data-sound>О нас</a>
</footer>

<audio id="galochkaAudio" src="galochka.mp3" preload="auto"></audio>
<script src="script.js"></script>
<script>
// ── Filter logic ──
var btns  = document.querySelectorAll('.filter-btn');
var cards = document.querySelectorAll('.event-card');

btns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    btns.forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    var f = btn.dataset.filter;
    cards.forEach(function(card) {
      var status = card.dataset.status;
      var show = f==='all' || status===f;
      card.style.display = show ? '' : 'none';
    });
  });
});
</script>
</body>
</html>
