<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐦 SECRET — МапДев Вики</title>
  <link rel="icon" type="image/png" href="fav.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #87CEEB;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── SKY GRADIENT ── */
    #sky {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #4fc3f7 0%, #87CEEB 55%, #a5d6a7 55%, #66bb6a 100%);
      z-index: 0;
    }

    /* ── CLOUDS ── */
    .cloud {
      position: absolute; background: white;
      border-radius: 50px; opacity: .85;
      animation: cloudMove linear infinite;
    }
    .cloud::before, .cloud::after {
      content:''; position:absolute; background:white; border-radius:50%;
    }
    @keyframes cloudMove { from{transform:translateX(-200px)} to{transform:translateX(110vw)} }

    /* ── SUN ── */
    #sun {
      position: fixed; top: 30px; right: 60px;
      width: 70px; height: 70px;
      background: radial-gradient(circle, #fff176, #ffee58);
      border-radius: 50%;
      box-shadow: 0 0 0 12px rgba(255,238,88,.3), 0 0 0 24px rgba(255,238,88,.15);
      z-index: 1;
      animation: sunPulse 3s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100%{box-shadow:0 0 0 12px rgba(255,238,88,.3),0 0 0 24px rgba(255,238,88,.15)}
      50%{box-shadow:0 0 0 16px rgba(255,238,88,.35),0 0 0 32px rgba(255,238,88,.18)}
    }

    /* ── GROUND ── */
    #ground {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 110px;
      background: linear-gradient(180deg, #66bb6a 0%, #388e3c 100%);
      border-top: 4px solid #2e7d32;
      z-index: 10;
    }
    #ground::before {
      content:''; position:absolute; top:-8px; left:0; right:0;
      height: 12px;
      background: repeating-linear-gradient(90deg, #81c784 0px, #81c784 18px, #66bb6a 18px, #66bb6a 36px);
    }

    /* ── UI OVERLAY ── */
    #ui {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    #levelLabel {
      font-family: 'Fredoka One', cursive;
      font-size: 22px; color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
    #scoreBox {
      background: rgba(0,0,0,.35); border-radius: 12px;
      padding: 6px 16px; color: #fff;
      font-family: 'Fredoka One', cursive; font-size: 18px;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
    #birdsLeft {
      display: flex; gap: 6px; margin-left: 4px;
    }
    .bird-icon {
      width: 28px; height: 28px;
      background: #ef5350; border-radius: 50%;
      border: 3px solid #c62828;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    #restartBtn, #nextBtn {
      margin-left: auto;
      font-family: 'Fredoka One', cursive;
      font-size: 16px; padding: 8px 20px;
      background: #ff7043; color: #fff;
      border: none; border-radius: 20px;
      cursor: pointer; box-shadow: 0 4px 0 #bf360c;
      transition: transform .1s;
    }
    #restartBtn:active, #nextBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #bf360c; }
    #nextBtn { background:#66bb6a; box-shadow:0 4px 0 #2e7d32; display:none; }

    #backBtn {
      position: fixed; bottom: 120px; left: 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 14px; padding: 8px 18px;
      background: rgba(0,0,0,.4); color: #fff;
      border: none; border-radius: 20px; cursor: pointer;
      z-index: 100; text-decoration: none;
      box-shadow: 0 3px 0 rgba(0,0,0,.3);
    }

    /* ── CANVAS ── */
    #gameCanvas {
      position: fixed; inset: 0;
      z-index: 5;
      cursor: crosshair;
    }

    /* ── OVERLAY SCREENS ── */
    .screen {
      display: none; position: fixed; inset: 0;
      z-index: 200; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
    }
    .screen.active { display: flex; }
    .screen h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(36px,7vw,72px); color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,.6);
      animation: popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards;
    }
    .screen p {
      font-size: 18px; color: rgba(255,255,255,.85);
      text-align: center; max-width: 400px; line-height: 1.6;
    }
    .screen-btn {
      font-family: 'Fredoka One', cursive;
      font-size: 20px; padding: 14px 36px;
      background: #ff7043; color: #fff;
      border: none; border-radius: 30px; cursor: pointer;
      box-shadow: 0 6px 0 #bf360c;
      transition: transform .1s;
      animation: popIn .5s .1s cubic-bezier(.175,.885,.32,1.275) both;
    }
    .screen-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #bf360c; }
    .screen-btn.green { background:#66bb6a; box-shadow:0 6px 0 #2e7d32; }
    @keyframes popIn {
      from{opacity:0;transform:scale(.5) translateY(20px)}
      to{opacity:1;transform:scale(1) translateY(0)}
    }

    /* ── STARS ── */
    .stars-row { display:flex; gap:10px; }
    .star {
      font-size: 48px;
      filter: grayscale(1);
      transition: filter .3s, transform .3s;
    }
    .star.lit { filter: none; transform: scale(1.2); }

    /* ── SECRET BADGE ── */
    #secretBadge {
      position: fixed; top: 14px; right: 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 13px; color: #fff;
      background: rgba(0,0,0,.35); border-radius: 20px;
      padding: 5px 14px; z-index: 101;
      animation: fadeInDown .6s ease forwards;
    }
    @keyframes fadeInDown {
      from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)}
    }

    /* ── TRAJECTORY DOTS ── */
    .traj-dot {
      position: absolute; width:5px; height:5px;
      background: rgba(255,255,255,.6);
      border-radius: 50%; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="sky"></div>
<div id="sun"></div>
<div id="ground"></div>

<!-- Clouds -->
<div class="cloud" style="width:120px;height:36px;top:12%;left:-200px;animation-duration:28s;animation-delay:0s">
  <div style="width:60px;height:52px;top:-26px;left:20px;position:absolute;background:white;border-radius:50%"></div>
  <div style="width:44px;height:40px;top:-20px;left:55px;position:absolute;background:white;border-radius:50%"></div>
</div>
<div class="cloud" style="width:90px;height:28px;top:8%;left:-200px;animation-duration:22s;animation-delay:8s">
  <div style="width:48px;height:44px;top:-22px;left:14px;position:absolute;background:white;border-radius:50%"></div>
</div>
<div class="cloud" style="width:140px;height:40px;top:18%;left:-200px;animation-duration:35s;animation-delay:3s">
  <div style="width:70px;height:60px;top:-30px;left:25px;position:absolute;background:white;border-radius:50%"></div>
  <div style="width:50px;height:46px;top:-23px;left:70px;position:absolute;background:white;border-radius:50%"></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="levelLabel">Уровень 1</div>
  <div id="scoreBox">Счёт: <span id="scoreNum">0</span></div>
  <div id="birdsLeft"></div>
  <button id="restartBtn">🔄 Заново</button>
  <button id="nextBtn">➡️ Следующий</button>
</div>
<div id="secretBadge">🔒 Секретная страница</div>

<a href="main.html" id="backBtn">← Главная</a>

<!-- Screens -->
<div class="screen" id="winScreen">
  <h1>🎉 Победа!</h1>
  <div class="stars-row">
    <div class="star" id="s1">⭐</div>
    <div class="star" id="s2">⭐</div>
    <div class="star" id="s3">⭐</div>
  </div>
  <p id="winMsg"></p>
  <button class="screen-btn green" id="winNextBtn">Следующий уровень →</button>
  <button class="screen-btn" id="winRestartBtn" style="background:#78909c;box-shadow:0 6px 0 #37474f">Заново</button>
</div>

<div class="screen" id="loseScreen">
  <h1>😢 Увы...</h1>
  <p>Птицы закончились, а свиньи живы!</p>
  <button class="screen-btn" id="loseRestartBtn">Попробовать снова</button>
</div>

<div class="screen active" id="startScreen">
  <h1>🐦 Злые Птицы</h1>
  <p>Секретная мини-игра МапДев Вики.<br>Тяни рогатку и сноси свиней!</p>
  <button class="screen-btn" id="startBtn">Играть!</button>
</div>

<script>
// ══════════════════════════════════════════
//   ANGRY BIRDS — Mini Game
// ══════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, GROUND;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND = H - 110;
}
resize();
window.addEventListener('resize', () => { resize(); initLevel(); });

// ── Physics ──
const GRAVITY = 0.35;
const SLING_X = 160, SLING_Y_OFFSET = 220; // from ground
let SLING_Y;

// ── Game state ──
let score = 0;
let currentLevel = 0;
let state = 'idle'; // idle | aiming | flying | waiting
let bird = null;
let birdQueue = [];
let blocks = [];
let pigs = [];
let particles = [];
let trajectoryPoints = [];
let dragStart = null;
let dragCurrent = null;
let launched = false;
let waitTimer = 0;

// ── Level definitions ── (x as absolute offset from right, in pixels)
const LEVELS = [
  // Level 1: simple tower with one pig
  {
    birds: ['red','red','red'],
    pigs:   [{ xOff: 80, yOff: 0 }],
    blocks: [
      { xOff:  20, yOff:   0, w:18, h:90,  type:'wood'  },
      { xOff: 142, yOff:   0, w:18, h:90,  type:'wood'  },
      { xOff:  20, yOff:  90, w:140,h:16,  type:'wood'  },
      { xOff:  55, yOff: 106, w:16, h:50,  type:'glass' },
      { xOff: 109, yOff: 106, w:16, h:50,  type:'glass' },
    ]
  },
  // Level 2: two towers, two pigs
  {
    birds: ['red','red','red','red'],
    pigs:   [{ xOff: 60, yOff: 0 }, { xOff: 200, yOff: 0 }],
    blocks: [
      // left tower
      { xOff:  10, yOff:   0, w:16, h:110, type:'stone' },
      { xOff:  90, yOff:   0, w:16, h:110, type:'stone' },
      { xOff:  10, yOff: 110, w:96, h:16,  type:'stone' },
      { xOff:  30, yOff: 126, w:16, h:50,  type:'glass' },
      { xOff:  70, yOff: 126, w:16, h:50,  type:'glass' },
      // right tower
      { xOff: 150, yOff:   0, w:16, h:110, type:'wood'  },
      { xOff: 230, yOff:   0, w:16, h:110, type:'wood'  },
      { xOff: 150, yOff: 110, w:96, h:16,  type:'wood'  },
      { xOff: 168, yOff: 126, w:16, h:50,  type:'glass' },
      { xOff: 208, yOff: 126, w:16, h:50,  type:'glass' },
    ]
  },
  // Level 3: pyramid fortress, three pigs
  {
    birds: ['red','red','blue','red','red'],
    pigs:   [{ xOff: 55, yOff: 0 }, { xOff: 185, yOff: 0 }, { xOff: 120, yOff: 90 }],
    blocks: [
      // base pillars
      { xOff:   0, yOff:   0, w:16, h:80,  type:'wood'  },
      { xOff:  90, yOff:   0, w:16, h:80,  type:'stone' },
      { xOff: 155, yOff:   0, w:16, h:80,  type:'stone' },
      { xOff: 240, yOff:   0, w:16, h:80,  type:'wood'  },
      // base platform
      { xOff:   0, yOff:  80, w:256,h:16,  type:'wood'  },
      // mid pillars
      { xOff:  30, yOff:  96, w:16, h:70,  type:'glass' },
      { xOff: 210, yOff:  96, w:16, h:70,  type:'glass' },
      // mid platform
      { xOff:  30, yOff: 166, w:196,h:16,  type:'stone' },
      // top pillar
      { xOff:  90, yOff: 182, w:16, h:50,  type:'glass' },
      { xOff: 160, yOff: 182, w:16, h:50,  type:'glass' },
      { xOff:  90, yOff: 232, w:86, h:16,  type:'wood'  },
    ]
  }
];

// ── Block colours ──
const BLOCK_COLORS = {
  wood:  { fill:'#d4a04a', stroke:'#8b6020', damage:'#a0602a' },
  stone: { fill:'#9e9e9e', stroke:'#616161', damage:'#757575' },
  glass: { fill:'rgba(178,235,242,0.7)', stroke:'#0097a7', damage:'rgba(178,235,242,0.4)' }
};

// ── Block HP (high so blocks survive hits) ──
const BLOCK_HP = { wood: 80, stone: 160, glass: 40 };

// ── Bird colours ──
const BIRD_COLORS = {
  red:  { body:'#ef5350', belly:'#ffcdd2', beak:'#ff8f00', eye:'#fff' },
  blue: { body:'#42a5f5', belly:'#bbdefb', beak:'#ff8f00', eye:'#fff' },
  yellow:{ body:'#ffee58', belly:'#fff9c4', beak:'#ff8f00', eye:'#fff' },
};

// ── Pig colour ──
const PIG_COLOR = { body:'#66bb6a', face:'#a5d6a7', eye:'#fff', pupil:'#212121', nose:'#388e3c' };

// ── Pig HP ──
const PIG_HP = 60;

function initLevel() {
  SLING_Y = GROUND;
  const lvl = LEVELS[currentLevel];
  score = 0;
  updateScore();
  state = 'idle';
  launched = false;
  dragStart = null;
  dragCurrent = null;
  trajectoryPoints = [];
  particles = [];

  birdQueue = lvl.birds.map(t => ({ type: t }));

  // Structures start from right side, anchored 300px from right edge
  const baseX = W - 340;

  // resolve blocks — placed precisely, resting on ground or on other blocks
  blocks = lvl.blocks.map(b => {
    const bx = baseX + b.xOff;
    const by = GROUND - b.h - b.yOff;
    const hp = BLOCK_HP[b.type];
    return {
      x: bx, y: by, w: b.w, h: b.h,
      type: b.type,
      hp, maxHp: hp,
      vx: 0, vy: 0, dead: false, angle: 0,
      awake: false  // sleeping = no physics until hit
    };
  });

  // resolve pigs
  pigs = lvl.pigs.map(p => {
    const px = baseX + p.xOff + 11; // center on gap between blocks
    const py = GROUND - 22 - p.yOff;
    return { x: px, y: py, r: 22, hp: PIG_HP, maxHp: PIG_HP, dead: false, vx:0, vy:0 };
  });

  spawnBird();
  updateBirdsUI();
  document.getElementById('levelLabel').textContent = `Уровень ${currentLevel+1}`;
}

function spawnBird() {
  if (birdQueue.length === 0) { bird = null; return; }
  const t = birdQueue.shift();
  const r = t.type === 'blue' ? 16 : 20;
  bird = {
    type: t.type, r,
    x: SLING_X, y: SLING_Y - SLING_Y_OFFSET + 20,
    vx: 0, vy: 0,
    alive: true, launched: false,
    trail: []
  };
  updateBirdsUI();
}

function updateBirdsUI() {
  const el = document.getElementById('birdsLeft');
  el.innerHTML = '';
  const remaining = birdQueue.length + (bird ? 1 : 0);
  for (let i = 0; i < remaining; i++) {
    const d = document.createElement('div');
    d.className = 'bird-icon';
    d.textContent = '🐦';
    el.appendChild(d);
  }
}

function updateScore() {
  document.getElementById('scoreNum').textContent = score;
}

// ── Input ──
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', e => {
  if (state !== 'idle') return;
  const dx = e.clientX - SLING_X;
  const dy = e.clientY - (SLING_Y - SLING_Y_OFFSET + 20);
  if (Math.sqrt(dx*dx+dy*dy) < 50) {
    state = 'aiming';
    dragStart = { x: SLING_X, y: SLING_Y - SLING_Y_OFFSET + 20 };
  }
});

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (state === 'aiming') {
    const MAX = 80;
    let dx = e.clientX - dragStart.x;
    let dy = e.clientY - dragStart.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist > MAX) { dx = dx/dist*MAX; dy = dy/dist*MAX; }
    dragCurrent = { x: dragStart.x + dx, y: dragStart.y + dy };
    if (bird) { bird.x = dragCurrent.x; bird.y = dragCurrent.y; }
    computeTrajectory();
  }
});

canvas.addEventListener('mouseup', e => {
  if (state !== 'aiming' || !bird) return;
  const power = 0.38;
  bird.vx = (dragStart.x - dragCurrent.x) * power;
  bird.vy = (dragStart.y - dragCurrent.y) * power;
  bird.launched = true;
  state = 'flying';
  dragCurrent = null;
  trajectoryPoints = [];
});

// Touch
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchend', e => {
  canvas.dispatchEvent(new MouseEvent('mouseup', {}));
});

function computeTrajectory() {
  if (!dragCurrent) return;
  trajectoryPoints = [];
  const power = 0.38;
  let vx = (dragStart.x - dragCurrent.x) * power;
  let vy = (dragStart.y - dragCurrent.y) * power;
  let x = dragStart.x, y = dragStart.y;
  for (let i = 0; i < 55; i++) {
    x += vx; y += vy; vy += GRAVITY;
    if (y > GROUND) break;
    if (i % 3 === 0) trajectoryPoints.push({ x, y });
  }
}

// ── Physics update ──
function update() {
  if (state === 'flying' && bird && bird.launched) {
    bird.trail.push({ x: bird.x, y: bird.y });
    if (bird.trail.length > 18) bird.trail.shift();

    bird.vy += GRAVITY;
    bird.x += bird.vx;
    bird.y += bird.vy;

    // ground
    if (bird.y + bird.r >= GROUND) {
      bird.y = GROUND - bird.r;
      bird.vy *= -0.3;
      bird.vx *= 0.6;
      if (Math.abs(bird.vy) < 1) { bird.alive = false; }
      spawnParticles(bird.x, GROUND, '#ef5350', 8);
    }

    // off-screen right
    if (bird.x > W + 100) bird.alive = false;

    // collide blocks
    blocks.forEach(b => {
      if (b.dead) return;
      if (bird.x + bird.r > b.x && bird.x - bird.r < b.x + b.w &&
          bird.y + bird.r > b.y && bird.y - bird.r < b.y + b.h) {
        const spd = Math.sqrt(bird.vx*bird.vx + bird.vy*bird.vy);
        const dmg = spd * 4;
        b.hp -= dmg;
        b.awake = true;
        b.vx += bird.vx * 0.5;
        b.vy += bird.vy * 0.4;
        // wake neighbours
        blocks.forEach(nb => {
          if (nb === b || nb.dead) return;
          if (Math.abs(nb.x - b.x) < b.w + nb.w + 10 &&
              Math.abs(nb.y - b.y) < b.h + nb.h + 10) {
            nb.awake = true;
            nb.vx += bird.vx * 0.15;
            nb.vy += bird.vy * 0.1;
          }
        });
        if (b.hp <= 0) {
          b.dead = true;
          score += 500;
          updateScore();
          spawnParticles(b.x + b.w/2, b.y + b.h/2, BLOCK_COLORS[b.type].fill, 12);
        }
        bird.vx *= 0.35; bird.vy *= -0.25;
        bird.alive = false;
      }
    });

    // collide pigs
    pigs.forEach(p => {
      if (p.dead) return;
      const dx = bird.x - p.x, dy = bird.y - p.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < bird.r + p.r) {
        const spd = Math.sqrt(bird.vx*bird.vx + bird.vy*bird.vy);
        p.hp -= spd * 3;
        p.vx += bird.vx * 0.5;
        p.vy += bird.vy * 0.4;
        if (p.hp <= 0) {
          p.dead = true;
          score += 1000;
          updateScore();
          spawnParticles(p.x, p.y, '#66bb6a', 16);
        }
        bird.vx *= 0.3; bird.vy *= -0.4;
        bird.alive = false;
      }
    });

    if (!bird.alive) {
      state = 'waiting';
      waitTimer = 90;
    }
  }

  // block physics — only awake blocks move
  blocks.forEach(b => {
    if (b.dead || !b.awake) return;
    b.vy += GRAVITY * 0.6;
    b.x += b.vx;
    b.y += b.vy;
    b.angle += b.vx * 0.025;
    b.vx *= 0.92;
    b.vy *= 0.99;
    if (b.y + b.h >= GROUND) {
      b.y = GROUND - b.h;
      b.vy *= -0.18;
      b.vx *= 0.65;
      if (Math.abs(b.vy) < 1 && Math.abs(b.vx) < 0.5) {
        b.vy = 0; b.vx = 0;
      }
    }
    const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (spd > 2) {
      // wake nearby sleeping blocks (chain reaction)
      blocks.forEach(nb => {
        if (nb === b || nb.dead || nb.awake) return;
        if (b.x < nb.x + nb.w + 6 && b.x + b.w > nb.x - 6 &&
            b.y < nb.y + nb.h + 6 && b.y + b.h > nb.y - 6) {
          nb.awake = true;
          nb.vx += b.vx * 0.25;
          nb.vy += b.vy * 0.2;
        }
      });
      // damage pigs if block hits fast enough
      pigs.forEach(p => {
        if (p.dead) return;
        if (b.x < p.x + p.r && b.x + b.w > p.x - p.r &&
            b.y < p.y + p.r && b.y + b.h > p.y - p.r) {
          p.hp -= spd * 2.5;
          if (p.hp <= 0) {
            p.dead = true;
            score += 1000;
            updateScore();
            spawnParticles(p.x, p.y, '#66bb6a', 16);
          }
        }
      });
    }
  });

  // pig physics (knocked)
  pigs.forEach(p => {
    if (p.dead) return;
    p.vy += GRAVITY * 0.4;
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.88;
    if (p.y + p.r >= GROUND) {
      p.y = GROUND - p.r;
      p.vy *= -0.15;
    }
  });

  // particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += GRAVITY * 0.3;
    p.life--;
    p.alpha = p.life / p.maxLife;
  });

  // waiting → next bird
  if (state === 'waiting') {
    waitTimer--;
    if (waitTimer <= 0) {
      if (birdQueue.length > 0) {
        spawnBird();
        state = 'idle';
      } else {
        bird = null;
        state = 'gameover';
        checkWin();
      }
    }
  }

  // check win mid-flight
  if (state === 'flying' || state === 'waiting') {
    if (pigs.every(p => p.dead)) {
      setTimeout(checkWin, 600);
      state = 'ended';
    }
  }
}

function checkWin() {
  if (pigs.every(p => p.dead)) {
    // bonus for remaining birds
    const bonus = birdQueue.length * 2000 + (bird ? 2000 : 0);
    score += bonus;
    updateScore();
    showWin();
  } else {
    showLose();
  }
}

function showWin() {
  const s1 = document.getElementById('s1');
  const s2 = document.getElementById('s2');
  const s3 = document.getElementById('s3');
  s1.classList.remove('lit'); s2.classList.remove('lit'); s3.classList.remove('lit');
  setTimeout(() => {
    s1.classList.add('lit');
    if (score > 3000) setTimeout(() => s2.classList.add('lit'), 400);
    if (score > 6000) setTimeout(() => s3.classList.add('lit'), 800);
  }, 300);
  document.getElementById('winMsg').textContent = `Счёт: ${score}  |  Птиц осталось: ${birdQueue.length}`;
  const hasNext = currentLevel + 1 < LEVELS.length;
  document.getElementById('winNextBtn').style.display = hasNext ? '' : 'none';
  document.getElementById('winScreen').classList.add('active');
}

function showLose() {
  document.getElementById('loseScreen').classList.add('active');
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      color, r: 3 + Math.random() * 4,
      life: 30 + Math.random() * 20,
      maxLife: 50, alpha: 1
    });
  }
}

//   DETAILED DRAWING FUNCTIONS

function drawRedBird(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy);

  // shadow
  ctx.beginPath(); ctx.ellipse(0, r*0.85, r*0.7, r*0.18, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fill();

  // body gradient — dark red bottom, bright red top
  let bg = ctx.createRadialGradient(-r*0.25,-r*0.3,r*0.05, 0,0,r);
  bg.addColorStop(0,'#ff6b5b'); bg.addColorStop(0.5,'#e8251a'); bg.addColorStop(1,'#8b0000');
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle='#6b0000'; ctx.lineWidth=r*0.06; ctx.stroke();

  // chest / belly — cream oval
  ctx.beginPath(); ctx.ellipse(r*0.05,r*0.28,r*0.52,r*0.38,0.15,0,Math.PI*2);
  let chg = ctx.createRadialGradient(r*0.05,r*0.2,0, r*0.05,r*0.28,r*0.5);
  chg.addColorStop(0,'#fffde7'); chg.addColorStop(1,'#f5deb3');
  ctx.fillStyle=chg; ctx.fill();

  // top crest — 3 feather spikes
  [[-r*0.22,-r, -r*0.28,-r*1.38, -r*0.12,-r*0.92],
   [r*0.0,-r*0.96, -r*0.04,-r*1.32, r*0.15,-r*0.9],
   [r*0.2,-r*0.88, r*0.18,-r*1.18, r*0.34,-r*0.8]
  ].forEach(([x1,y1,cx1,cy1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1);
    ctx.quadraticCurveTo(cx1,cy1,x2,y2);
    let cg=ctx.createLinearGradient(x1,y1,x2,y2);
    cg.addColorStop(0,'#cc1a0e'); cg.addColorStop(1,'#8b0000');
    ctx.strokeStyle=cg; ctx.lineWidth=r*0.18; ctx.lineCap='round'; ctx.stroke();
  });

  // left eye
  ctx.beginPath(); ctx.arc(-r*0.22,-r*0.15,r*0.28,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=r*0.06; ctx.stroke();
  // pupil
  ctx.beginPath(); ctx.arc(-r*0.18,-r*0.18,r*0.15,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a'; ctx.fill();
  // catchlight
  ctx.beginPath(); ctx.arc(-r*0.12,-r*0.24,r*0.06,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // angry brow left — thick, angled
  ctx.save(); ctx.translate(-r*0.22,-r*0.44);
  ctx.rotate(-0.55);
  ctx.beginPath(); ctx.rect(-r*0.3,-r*0.09,r*0.58,r*0.13);
  let brg=ctx.createLinearGradient(-r*0.3,0,r*0.28,0);
  brg.addColorStop(0,'#2d1a00'); brg.addColorStop(1,'#4a2800');
  ctx.fillStyle=brg; ctx.fill(); ctx.restore();

  // beak — two halves, orange/yellow
  // upper beak
  ctx.beginPath();
  ctx.moveTo(r*0.28,-r*0.08); ctx.lineTo(r*0.82,-r*0.04); ctx.lineTo(r*0.52,r*0.14); ctx.closePath();
  let ubg=ctx.createLinearGradient(r*0.28,-r*0.08,r*0.82,r*0.14);
  ubg.addColorStop(0,'#ffb300'); ubg.addColorStop(1,'#e65100');
  ctx.fillStyle=ubg; ctx.fill(); ctx.strokeStyle='#bf360c'; ctx.lineWidth=r*0.04; ctx.stroke();
  // lower beak
  ctx.beginPath();
  ctx.moveTo(r*0.32,r*0.1); ctx.lineTo(r*0.78,r*0.06); ctx.lineTo(r*0.5,r*0.26); ctx.closePath();
  ctx.fillStyle='#e65100'; ctx.fill(); ctx.stroke();

  // tail feathers (right side)
  [[-r*0.9,r*0.1,-r*1.28,-r*0.08,-r*0.85,-r*0.15],
   [-r*0.88,r*0.25,-r*1.3,r*0.18,-r*0.82,r*0.05],
   [-r*0.82,r*0.42,-r*1.18,r*0.52,-r*0.72,r*0.22]
  ].forEach(([x1,y1,qx,qy,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(qx,qy,x2,y2);
    ctx.strokeStyle='#b71c1c'; ctx.lineWidth=r*0.15; ctx.lineCap='round'; ctx.stroke();
  });

  // shine spot
  ctx.beginPath(); ctx.ellipse(-r*0.28,-r*0.38,r*0.2,r*0.12,-0.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();

  ctx.restore();
}

function drawBlueBird(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy);

  // shadow
  ctx.beginPath(); ctx.ellipse(0,r*0.88,r*0.65,r*0.15,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fill();

  // body — sky blue gradient
  let bg=ctx.createRadialGradient(-r*0.2,-r*0.25,r*0.05,0,0,r);
  bg.addColorStop(0,'#81d4fa'); bg.addColorStop(0.5,'#0288d1'); bg.addColorStop(1,'#01579b');
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='#013f6e'; ctx.lineWidth=r*0.07; ctx.stroke();

  // belly
  ctx.beginPath(); ctx.ellipse(r*0.06,r*0.3,r*0.48,r*0.34,0.1,0,Math.PI*2);
  ctx.fillStyle='#e1f5fe'; ctx.fill();

  // crest — 2 spikes
  [[-r*0.08,-r,  -r*0.14,-r*1.3, r*0.08,-r*0.9],
   [r*0.12,-r*0.9, r*0.2,-r*1.2, r*0.3,-r*0.8]
  ].forEach(([x1,y1,cx1,cy1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(cx1,cy1,x2,y2);
    ctx.strokeStyle='#0277bd'; ctx.lineWidth=r*0.18; ctx.lineCap='round'; ctx.stroke();
  });

  // eye
  ctx.beginPath(); ctx.arc(-r*0.18,-r*0.16,r*0.26,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=r*0.06; ctx.stroke();
  ctx.beginPath(); ctx.arc(-r*0.14,-r*0.19,r*0.13,0,Math.PI*2);
  ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(-r*0.09,-r*0.24,r*0.05,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // brow
  ctx.save(); ctx.translate(-r*0.18,-r*0.42); ctx.rotate(-0.5);
  ctx.beginPath(); ctx.rect(-r*0.25,-r*0.08,r*0.5,r*0.12);
  ctx.fillStyle='#1a2a3a'; ctx.fill(); ctx.restore();

  // beak (stubby)
  ctx.beginPath();
  ctx.moveTo(r*0.22,-r*0.06); ctx.lineTo(r*0.7,r*0.02); ctx.lineTo(r*0.44,r*0.2); ctx.closePath();
  ctx.fillStyle='#ffb300'; ctx.fill(); ctx.strokeStyle='#e65100'; ctx.lineWidth=r*0.04; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(r*0.26,r*0.12); ctx.lineTo(r*0.66,r*0.06); ctx.lineTo(r*0.42,r*0.24); ctx.closePath();
  ctx.fillStyle='#e65100'; ctx.fill();

  // tail
  [[-r*0.85,r*0.05,-r*1.2,-r*0.05,-r*0.8,-r*0.18],
   [-r*0.82,r*0.28,-r*1.18,r*0.3,-r*0.74,r*0.1]
  ].forEach(([x1,y1,qx,qy,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(qx,qy,x2,y2);
    ctx.strokeStyle='#0277bd'; ctx.lineWidth=r*0.14; ctx.lineCap='round'; ctx.stroke();
  });

  ctx.beginPath(); ctx.ellipse(-r*0.22,-r*0.35,r*0.18,r*0.1,-0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fill();
  ctx.restore();
}

function drawChuckBird(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy);

  ctx.beginPath(); ctx.ellipse(0,r*0.88,r*0.65,r*0.15,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fill();

  // triangular body — Chuck is pointy/triangular
  let bg=ctx.createRadialGradient(-r*0.1,-r*0.2,0,0,0,r*1.1);
  bg.addColorStop(0,'#fff176'); bg.addColorStop(0.55,'#f9a825'); bg.addColorStop(1,'#e65100');
  ctx.beginPath();
  ctx.moveTo(r*0.95,r*0.1); // right point (beak)
  ctx.quadraticCurveTo(r*0.5,-r*0.4, -r*0.1,-r*0.95); // top
  ctx.quadraticCurveTo(-r*0.55,-r*0.6,-r*0.88,-r*0.1); // left top
  ctx.quadraticCurveTo(-r*0.9,r*0.5,-r*0.5,r*0.88); // left bottom
  ctx.quadraticCurveTo(r*0.1,r*1.05,r*0.7,r*0.55); // bottom
  ctx.quadraticCurveTo(r*0.95,r*0.38,r*0.95,r*0.1);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='#bf360c'; ctx.lineWidth=r*0.07; ctx.stroke();

  // belly
  ctx.beginPath(); ctx.ellipse(r*0.1,r*0.32,r*0.44,r*0.3,0.2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,252,220,0.8)'; ctx.fill();

  // 3 crest spikes going right-up
  [[-r*0.05,-r*0.9, r*0.1,-r*1.3, r*0.28,-r*0.85],
   [r*0.1,-r*0.78,  r*0.3,-r*1.12, r*0.46,-r*0.7],
   [r*0.25,-r*0.65, r*0.48,-r*0.95, r*0.6,-r*0.52]
  ].forEach(([x1,y1,cx1,cy1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(cx1,cy1,x2,y2);
    ctx.strokeStyle='#f57f17'; ctx.lineWidth=r*0.17; ctx.lineCap='round'; ctx.stroke();
  });

  // eye
  ctx.beginPath(); ctx.arc(-r*0.12,-r*0.22,r*0.25,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=r*0.06; ctx.stroke();
  ctx.beginPath(); ctx.arc(-r*0.08,-r*0.25,r*0.13,0,Math.PI*2);
  ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(-r*0.04,-r*0.3,r*0.05,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // brow
  ctx.save(); ctx.translate(-r*0.12,-r*0.48); ctx.rotate(-0.7);
  ctx.beginPath(); ctx.rect(-r*0.22,-r*0.08,r*0.44,r*0.13);
  ctx.fillStyle='#3e2000'; ctx.fill(); ctx.restore();

  // beak (triangular, pointing right)
  ctx.beginPath();
  ctx.moveTo(r*0.35,-r*0.06); ctx.lineTo(r*0.92,r*0.1); ctx.lineTo(r*0.35,r*0.22); ctx.closePath();
  let ubg=ctx.createLinearGradient(r*0.35,-r*0.06,r*0.92,r*0.22);
  ubg.addColorStop(0,'#ffe082'); ubg.addColorStop(1,'#e65100');
  ctx.fillStyle=ubg; ctx.fill(); ctx.strokeStyle='#bf360c'; ctx.lineWidth=r*0.04; ctx.stroke();

  // tail spikes (back left)
  [[-r*0.82,r*0.08,-r*1.24,-r*0.12,-r*0.88,-r*0.28],
   [-r*0.88,r*0.3,-r*1.28,r*0.22,-r*0.84,r*0.02],
   [-r*0.78,r*0.52,-r*1.15,r*0.6,-r*0.68,r*0.28]
  ].forEach(([x1,y1,qx,qy,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(qx,qy,x2,y2);
    ctx.strokeStyle='#f57f17'; ctx.lineWidth=r*0.15; ctx.lineCap='round'; ctx.stroke();
  });

  ctx.beginPath(); ctx.ellipse(-r*0.15,-r*0.42,r*0.2,r*0.1,-0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
  ctx.restore();
}

function drawBird(x, y, r, type, angle) {
  ctx.save();
  ctx.translate(x, y);
  if (angle) ctx.rotate(angle);
  ctx.translate(-x, -y);
  if (type === 'red')    drawRedBird(x, y, r);
  else if (type === 'blue')  drawBlueBird(x, y, r);
  else if (type === 'yellow') drawChuckBird(x, y, r);
  else drawRedBird(x, y, r);
  ctx.restore();
}

function drawPig(p) {
  if (p.dead) return;
  const dmg = 1 - p.hp / p.maxHp;
  const r = p.r;
  ctx.save(); ctx.translate(p.x, p.y);

  // shadow
  ctx.beginPath(); ctx.ellipse(0,r*0.9,r*0.65,r*0.15,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fill();

  // body gradient — vibrant green
  let bg=ctx.createRadialGradient(-r*0.2,-r*0.22,r*0.05,0,0,r);
  bg.addColorStop(0, dmg>0.5?'#a5d6a7':'#aed581');
  bg.addColorStop(0.55, dmg>0.5?'#388e3c':'#558b2f');
  bg.addColorStop(1, dmg>0.5?'#1b5e20':'#33691e');
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle= dmg>0.5?'#1b5e20':'#33691e';
  ctx.lineWidth=r*0.08; ctx.stroke();

  // small ear bumps
  [-r*0.55,-r*0.52, r*0.55,-r*0.52].forEach((ex,i)=>{
    if(i%2===0){
      const ey = [-r*0.52,r*0.52][Math.floor(i/2)] ?? -r*0.52;
      ctx.beginPath(); ctx.arc(ex, -r*0.52, r*0.2, 0, Math.PI*2);
      ctx.fillStyle='#4caf50'; ctx.fill();
      ctx.strokeStyle='#33691e'; ctx.lineWidth=r*0.06; ctx.stroke();
    }
  });
  // ears properly
  [[-r*0.56,-r*0.5],[r*0.56,-r*0.5]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.arc(ex,ey,r*0.2,0,Math.PI*2);
    ctx.fillStyle='#66bb6a'; ctx.fill();
    ctx.strokeStyle='#33691e'; ctx.lineWidth=r*0.06; ctx.stroke();
    ctx.beginPath(); ctx.arc(ex,ey,r*0.1,0,Math.PI*2);
    ctx.fillStyle='#a5d6a7'; ctx.fill();
  });

  // face highlight
  ctx.beginPath(); ctx.ellipse(r*0.04,-r*0.06,r*0.62,r*0.55,0,0,Math.PI*2);
  ctx.fillStyle='rgba(178,255,178,0.18)'; ctx.fill();

  // eyes — white sclera, dark pupils
  [[-r*0.3,-r*0.2],[r*0.3,-r*0.2]].forEach(([ex,ey])=>{
    // sclera
    ctx.beginPath(); ctx.arc(ex,ey,r*0.26,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.strokeStyle='#2e7d32'; ctx.lineWidth=r*0.06; ctx.stroke();
    // iris
    ctx.beginPath(); ctx.arc(ex+r*0.04,ey+r*0.04,r*0.16,0,Math.PI*2);
    ctx.fillStyle='#1b5e20'; ctx.fill();
    // pupil
    ctx.beginPath(); ctx.arc(ex+r*0.05,ey+r*0.05,r*0.09,0,Math.PI*2);
    ctx.fillStyle='#060c06'; ctx.fill();
    // catchlight
    ctx.beginPath(); ctx.arc(ex+r*0.0,ey-r*0.02,r*0.05,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
  });

  // angry brow if damaged
  if (dmg > 0.15) {
    [[-r*0.45,-r*0.46,0.35],[r*0.15,-r*0.46,-0.35]].forEach(([bx,by,rot])=>{
      ctx.save(); ctx.translate(bx,by); ctx.rotate(rot);
      ctx.beginPath(); ctx.rect(-r*0.22,-r*0.07,r*0.44,r*0.11);
      ctx.fillStyle='#1b3a12'; ctx.fill(); ctx.restore();
    });
  }

  // snout — oval, lighter green
  ctx.beginPath(); ctx.ellipse(0,r*0.24,r*0.38,r*0.28,0,0,Math.PI*2);
  let sg=ctx.createRadialGradient(0,r*0.2,0,0,r*0.24,r*0.38);
  sg.addColorStop(0,'#81c784'); sg.addColorStop(1,'#4caf50');
  ctx.fillStyle=sg; ctx.fill();
  ctx.strokeStyle='#2e7d32'; ctx.lineWidth=r*0.06; ctx.stroke();
  // nostrils
  [[-r*0.15,r*0.24],[r*0.15,r*0.24]].forEach(([nx,ny])=>{
    ctx.beginPath(); ctx.ellipse(nx,ny,r*0.08,r*0.07,0,0,Math.PI*2);
    ctx.fillStyle='#2e7d32'; ctx.fill();
  });

  // damage cracks
  if (dmg > 0.35) {
    ctx.save();
    ctx.strokeStyle='rgba(0,40,0,0.45)'; ctx.lineWidth=r*0.05; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-r*0.1,-r*0.6); ctx.lineTo(r*0.05,-r*0.1); ctx.lineTo(-r*0.2,r*0.2);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.3,-r*0.4); ctx.lineTo(r*0.15,r*0.0); ctx.lineTo(r*0.35,r*0.25);
    ctx.stroke();
    ctx.restore();
  }

  // shine
  ctx.beginPath(); ctx.ellipse(-r*0.22,-r*0.35,r*0.2,r*0.11,-0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fill();

  ctx.restore();
}

function drawBlock(b) {
  if (b.dead) return;
  const dmg = 1 - b.hp / b.maxHp;
  ctx.save();
  ctx.translate(b.x + b.w/2, b.y + b.h/2);
  ctx.rotate(b.angle || 0);
  const hw = b.w/2, hh = b.h/2;

  if (b.type === 'wood') {
    // wood plank — warm brown with grain
    let wg = ctx.createLinearGradient(-hw,-hh,hw,hh);
    wg.addColorStop(0, dmg>0.5?'#8d5524':'#c68642');
    wg.addColorStop(0.4,'#a0522d'); wg.addColorStop(1,'#8b4513');
    ctx.fillStyle=wg;
    ctx.beginPath(); ctx.roundRect(-hw,-hh,b.w,b.h,3);
    ctx.fill();
    // grain lines
    ctx.save(); ctx.globalAlpha=0.15;
    ctx.strokeStyle='#4a2000'; ctx.lineWidth=1.5;
    const step = Math.max(8, b.h/5);
    for(let i=-hh+step;i<hh;i+=step){
      ctx.beginPath(); ctx.moveTo(-hw+2,i); ctx.bezierCurveTo(-hw/2,i-2,hw/2,i+2,hw-2,i);
      ctx.stroke();
    }
    ctx.restore();
    // knot
    if(b.h>40){
      ctx.save(); ctx.globalAlpha=0.2;
      ctx.beginPath(); ctx.ellipse(0,0,b.w*0.18,b.h*0.14,0,0,Math.PI*2);
      ctx.strokeStyle='#4a2000'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
    }
    ctx.strokeStyle='#5d2e0c'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(-hw,-hh,b.w,b.h,3); ctx.stroke();

  } else if (b.type === 'stone') {
    // stone — grey with texture
    let sg=ctx.createLinearGradient(-hw,-hh,hw,hh);
    sg.addColorStop(0,dmg>0.5?'#757575':'#bdbdbd');
    sg.addColorStop(0.5,'#9e9e9e'); sg.addColorStop(1,'#616161');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.roundRect(-hw,-hh,b.w,b.h,4); ctx.fill();
    // texture dots
    ctx.save(); ctx.globalAlpha=0.12;
    for(let i=0;i<6;i++){
      const tx=(Math.random()-0.5)*b.w*0.7, ty=(Math.random()-0.5)*b.h*0.7;
      ctx.beginPath(); ctx.arc(tx,ty,2+Math.random()*3,0,Math.PI*2);
      ctx.fillStyle='#424242'; ctx.fill();
    }
    ctx.restore();
    // highlight edge
    ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-hw+3,-hh+3); ctx.lineTo(hw-3,-hh+3); ctx.lineTo(hw-3,-hh+8);
    ctx.stroke();
    ctx.strokeStyle='#424242'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(-hw,-hh,b.w,b.h,4); ctx.stroke();

  } else { // glass/ice
    let gg=ctx.createLinearGradient(-hw,-hh,hw,hh);
    gg.addColorStop(0,dmg>0.5?'rgba(178,235,242,0.4)':'rgba(225,245,254,0.85)');
    gg.addColorStop(0.6,'rgba(179,229,252,0.65)');
    gg.addColorStop(1,'rgba(2,136,209,0.55)');
    ctx.fillStyle=gg;
    ctx.beginPath(); ctx.roundRect(-hw,-hh,b.w,b.h,4); ctx.fill();
    // inner shine
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.roundRect(-hw+2,-hh+2,b.w*0.5,b.h*0.45,3); ctx.fill();
    ctx.strokeStyle='rgba(2,136,209,0.8)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(-hw,-hh,b.w,b.h,4); ctx.stroke();
  }

  // damage cracks overlay
  if (dmg > 0.3) {
    ctx.save(); ctx.globalAlpha=dmg*0.7;
    ctx.strokeStyle= b.type==='glass'?'rgba(100,180,220,0.8)':'rgba(60,30,0,0.6)';
    ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-hw*0.3,-hh*0.6); ctx.lineTo(hw*0.2,hh*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hw*0.4,-hh*0.5); ctx.lineTo(-hw*0.1,hh*0.3); ctx.stroke();
    if(dmg>0.6){
      ctx.beginPath(); ctx.moveTo(-hw*0.6,hh*0.1); ctx.lineTo(hw*0.3,-hh*0.2); ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore();
}

function drawSlingshot() {
  const sy = SLING_Y;
  const bx = SLING_X;
  const topY = sy - SLING_Y_OFFSET;
  ctx.save(); ctx.lineCap='round';

  // main trunk — thick, tapered
  let tg=ctx.createLinearGradient(bx-10,sy,bx+10,sy);
  tg.addColorStop(0,'#3e2000'); tg.addColorStop(0.4,'#795548'); tg.addColorStop(1,'#4e342e');

  // left fork
  ctx.beginPath(); ctx.moveTo(bx,sy); ctx.lineTo(bx-24,topY+8);
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=18; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx,sy); ctx.lineTo(bx-24,topY+8);
  ctx.strokeStyle='#8d6e63'; ctx.lineWidth=14; ctx.stroke();
  // right fork
  ctx.beginPath(); ctx.moveTo(bx,sy); ctx.lineTo(bx+24,topY+8);
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=18; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx,sy); ctx.lineTo(bx+24,topY+8);
  ctx.strokeStyle='#8d6e63'; ctx.lineWidth=14; ctx.stroke();
  // stem
  ctx.beginPath(); ctx.moveTo(bx,sy-6); ctx.lineTo(bx,topY+35);
  ctx.strokeStyle='#4e342e'; ctx.lineWidth=22; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx,sy-6); ctx.lineTo(bx,topY+35);
  ctx.strokeStyle='#795548'; ctx.lineWidth=16; ctx.stroke();

  // fork tips — rounded knobs
  [[bx-24,topY+8],[bx+24,topY+8]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.arc(fx,fy,9,0,Math.PI*2);
    ctx.fillStyle='#4e342e'; ctx.fill();
    ctx.beginPath(); ctx.arc(fx-2,fy-2,4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fill();
  });

  // rubber bands
  const lx=bx-24, rx=bx+24, ty=topY+8;
  if (bird && state==='aiming' && dragCurrent) {
    const dx=dragCurrent.x, dy=dragCurrent.y;
    // back band (behind bird)
    ctx.beginPath(); ctx.moveTo(rx,ty); ctx.lineTo(dx,dy);
    ctx.strokeStyle='#4e342e'; ctx.lineWidth=5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx,ty); ctx.lineTo(dx,dy);
    ctx.strokeStyle='#8d6e63'; ctx.lineWidth=3; ctx.stroke();
    // front band (in front of bird)
    ctx.beginPath(); ctx.moveTo(lx,ty); ctx.lineTo(dx,dy);
    ctx.strokeStyle='#4e342e'; ctx.lineWidth=5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx,ty); ctx.lineTo(dx,dy);
    ctx.strokeStyle='#a1887f'; ctx.lineWidth=3; ctx.stroke();
  } else {
    // at rest — slight sag
    const mx=bx, my=topY+22;
    ctx.beginPath(); ctx.moveTo(lx,ty); ctx.quadraticCurveTo(mx-8,my,mx,my+4);
    ctx.strokeStyle='#5d4037'; ctx.lineWidth=4; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx,ty); ctx.quadraticCurveTo(mx+8,my,mx,my+4);
    ctx.strokeStyle='#5d4037'; ctx.lineWidth=4; ctx.stroke();
  }

  ctx.restore();
}

function drawBackground() {
  // sky already handled by CSS div, but draw distant elements on canvas

  // distant hills — soft rounded shapes
  ctx.save();
  // far hill left
  ctx.beginPath(); ctx.ellipse(W*0.25,GROUND+20,W*0.22,80,0,Math.PI,0);
  ctx.fillStyle='#81c784'; ctx.fill();
  // far hill right
  ctx.beginPath(); ctx.ellipse(W*0.75,GROUND+20,W*0.18,60,0,Math.PI,0);
  ctx.fillStyle='#a5d6a7'; ctx.fill();

  // ground strip with texture
  let gg=ctx.createLinearGradient(0,GROUND-8,0,GROUND+110);
  gg.addColorStop(0,'#81c784'); gg.addColorStop(0.15,'#66bb6a'); gg.addColorStop(1,'#388e3c');
  ctx.fillStyle=gg;
  ctx.fillRect(0,GROUND-8,W,118);

  // grass tufts
  ctx.strokeStyle='#4caf50'; ctx.lineWidth=2; ctx.lineCap='round';
  for(let i=0;i<W;i+=28){
    const h=6+Math.sin(i*0.3)*4;
    ctx.beginPath(); ctx.moveTo(i,GROUND-8); ctx.lineTo(i-4,GROUND-8-h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(i+6,GROUND-8); ctx.lineTo(i+10,GROUND-8-h*0.7); ctx.stroke();
  }

  // small rocks on ground
  [W*0.3,W*0.55,W*0.72].forEach((rx,i)=>{
    const rr=10+i*4;
    ctx.beginPath(); ctx.ellipse(rx,GROUND-rr*0.4,rr,rr*0.6,0,0,Math.PI*2);
    let rg=ctx.createRadialGradient(rx-rr*0.2,GROUND-rr*0.5,0,rx,GROUND-rr*0.4,rr);
    rg.addColorStop(0,'#bdbdbd'); rg.addColorStop(1,'#757575');
    ctx.fillStyle=rg; ctx.fill();
    ctx.strokeStyle='#616161'; ctx.lineWidth=1.5; ctx.stroke();
  });

  ctx.restore();
}

function drawTrajectory() {
  trajectoryPoints.forEach((p, i) => {
    ctx.save();
    ctx.globalAlpha = 0.75*(1-i/trajectoryPoints.length);
    // dashed star-dot style
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  });
}

function drawTrail() {
  if (!bird || !bird.trail) return;
  bird.trail.forEach((pt, i) => {
    const ratio = i/bird.trail.length;
    ctx.save();
    ctx.globalAlpha=ratio*0.35;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,bird.r*ratio*0.6,0,Math.PI*2);
    const colors={'red':'#ef5350','blue':'#42a5f5','yellow':'#ffee58'};
    ctx.fillStyle=colors[bird.type]||'#ef5350'; ctx.fill();
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha=p.alpha;
    // star-shaped particles
    ctx.translate(p.x,p.y);
    ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
    ctx.restore();
  });
}

function drawHint() {
  if (state !== 'idle' || !bird) return;
  ctx.save();
  ctx.font='bold 16px Fredoka One, Nunito, sans-serif';
  ctx.textAlign='center';
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillText('← Тяни птицу назад!', SLING_X+11, SLING_Y-SLING_Y_OFFSET-34);
  ctx.fillStyle='#fff';
  ctx.fillText('← Тяни птицу назад!', SLING_X+10, SLING_Y-SLING_Y_OFFSET-35);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawSlingshot();
  drawTrajectory();
  drawTrail();

  // queued birds sitting on ground left of slingshot
  birdQueue.forEach((b, i) => {
    const bx = SLING_X - 70 - i*36;
    const by = SLING_Y - 20;
    const sr = 14;
    ctx.save();
    ctx.translate(bx,by);
    ctx.translate(-bx,-by);
    if(b.type==='red')       drawRedBird(bx,by,sr);
    else if(b.type==='blue') drawBlueBird(bx,by,sr);
    else                     drawChuckBird(bx,by,sr);
    ctx.restore();
  });

  // current bird
  if (bird) {
    const angle = bird.launched ? Math.atan2(bird.vy, bird.vx)*0.6 : 0;
    ctx.save();
    ctx.translate(bird.x,bird.y);
    ctx.rotate(angle);
    ctx.translate(-bird.x,-bird.y);
    if(bird.type==='red')       drawRedBird(bird.x,bird.y,bird.r);
    else if(bird.type==='blue') drawBlueBird(bird.x,bird.y,bird.r);
    else                        drawChuckBird(bird.x,bird.y,bird.r);
    ctx.restore();
  }

  blocks.forEach(drawBlock);
  pigs.forEach(drawPig);
  drawParticles();
  drawHint();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── Button wiring ──
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').classList.remove('active');
  initLevel();
  loop();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('winScreen').classList.remove('active');
  document.getElementById('loseScreen').classList.remove('active');
  initLevel();
});

document.getElementById('winNextBtn').addEventListener('click', () => {
  document.getElementById('winScreen').classList.remove('active');
  currentLevel = Math.min(currentLevel + 1, LEVELS.length - 1);
  initLevel();
});

document.getElementById('winRestartBtn').addEventListener('click', () => {
  document.getElementById('winScreen').classList.remove('active');
  initLevel();
});

document.getElementById('loseRestartBtn').addEventListener('click', () => {
  document.getElementById('loseScreen').classList.remove('active');
  initLevel();
});
</script>
