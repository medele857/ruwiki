<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщения — МапДев Вики</title>
  <link rel="icon" type="image/png" href="fav.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    html, body { overflow: hidden !important; height: 100%; }

    .msg-bg {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(160deg, #07090f 0%, #0b0e18 100%);
    }

    /* ══ LAYOUT ══ */
    .msg-wrap {
      position: fixed;
      top: var(--hh, 56px); left: 0; right: 0; bottom: 0;
      display: flex;
    }

    /* ══ LEFT PANEL — dialogs ══ */
    .msg-left {
      width: 280px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--bg);
    }
    .msg-left-head {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .msg-left-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: .06em; color: var(--text);
      margin-bottom: 10px;
    }
    .msg-search-wrap { position: relative; }
    .msg-search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px; opacity: .4; pointer-events: none;
    }
    .msg-search {
      width: 100%; box-sizing: border-box;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); font-size: 13px;
      padding: 8px 10px 8px 30px; outline: none;
      transition: border-color .15s;
    }
    .msg-search:focus { border-color: var(--border2); }
    .msg-search::placeholder { color: var(--text2); opacity: .6; }

    /* New chat button */
    .msg-new-btn {
      margin: 10px 16px 0;
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font); font-size: 12px; letter-spacing: .05em;
      padding: 9px 14px; border-radius: var(--radius);
      border: 1px solid rgba(80,120,255,.35);
      background: rgba(80,120,255,.07); color: var(--accent);
      cursor: pointer; transition: all .15s;
    }
    .msg-new-btn:hover { background: rgba(80,120,255,.15); border-color: var(--accent); }

    /* Create dropdown menu */
    .msg-new-wrap { position: relative; margin: 10px 16px 0; }
    .msg-new-wrap .msg-new-btn { margin: 0; width: 100%; }
    .msg-new-menu {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 100;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 6px; display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
    }
    .msg-new-menu.show { display: block; animation: fadeUp .18s ease; }
    .msg-new-menu-item {
      display: block; width: 100%; text-align: left;
      font-family: var(--font); font-size: 13px; color: var(--text);
      padding: 9px 12px; border: none; background: none; border-radius: 6px;
      cursor: pointer; transition: background .12s;
    }
    .msg-new-menu-item:hover { background: var(--bg3); }

    /* Tabs */
    .msg-tabs { display: flex; gap: 4px; padding: 10px 16px 0; }
    .msg-tab {
      flex: 1; font-family: var(--font); font-size: 11px; letter-spacing: .03em;
      padding: 7px 4px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg3); color: var(--text2); cursor: pointer;
      transition: all .13s; text-align: center;
    }
    .msg-tab.active { border-color: var(--border2); color: var(--accent); background: var(--bg); }

    /* Group/channel icons */
    .msg-dialog-group-icon {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      background: linear-gradient(135deg, #5090ff, #8040ff);
    }
    .msg-dialog-channel-icon { background: linear-gradient(135deg, #ff9020, #ff5060); }

    .msg-chat-members { font-size: 11px; color: var(--text2); }
    .msg-chat-manage {
      margin-left: auto; font-family: var(--font); font-size: 11px;
      padding: 5px 12px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg3); color: var(--text2); cursor: pointer; transition: all .13s;
    }
    .msg-chat-manage:hover { border-color: var(--border2); color: var(--text); }

    .msg-channel-readonly {
      padding: 14px 20px; text-align: center; font-size: 12px;
      color: var(--text2); border-top: 1px solid var(--border); background: var(--bg2);
    }

    /* Dialog list */
    .msg-dialog-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .msg-dialog-list::-webkit-scrollbar { width: 3px; }
    .msg-dialog-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .msg-dialog-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      transition: background .12s;
      position: relative;
    }
    .msg-dialog-item:hover { background: var(--bg2); }
    .msg-dialog-item.active { background: var(--bg3); }
    .msg-dialog-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; color: var(--accent);
      font-family: var(--font);
    }
    .msg-dialog-info { flex: 1; min-width: 0; }
    .msg-dialog-nick { font-family: var(--font); font-size: 13px; color: var(--text); margin-bottom: 2px; }
    .msg-dialog-preview {
      font-size: 11px; color: var(--text2); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .msg-dialog-time { font-size: 10px; color: var(--text2); flex-shrink: 0; }
    .msg-unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      box-shadow: 0 0 6px var(--accent);
    }

    .msg-empty-dialogs {
      padding: 40px 16px; text-align: center;
      font-size: 12px; color: var(--text2); opacity: .5;
    }

    /* ══ RIGHT PANEL — chat ══ */
    .msg-right {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; background: var(--bg);
    }

    /* Chat header */
    .msg-chat-head {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .msg-chat-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--accent); font-family: var(--font);
    }
    .msg-chat-nick { font-family: var(--font); font-size: 14px; color: var(--text); }
    .msg-chat-status { font-size: 11px; color: var(--text2); margin-top: 1px; }

    /* Welcome screen */
    .msg-welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text2); text-align: center; padding: 40px;
    }
    .msg-welcome-icon { font-size: 48px; margin-bottom: 16px; opacity: .3; }
    .msg-welcome-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: .06em; color: var(--text); margin-bottom: 8px; }
    .msg-welcome-sub { font-size: 13px; opacity: .5; }

    /* No nick screen */
    .msg-nonick {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text2); text-align: center; padding: 40px;
    }
    .msg-nonick-icon { font-size: 44px; margin-bottom: 16px; opacity: .35; }
    .msg-nonick-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: .06em; color: var(--text); margin-bottom: 8px; }
    .msg-nonick-sub { font-size: 13px; opacity: .5; line-height: 1.7; }

    /* Messages area */
    .msg-messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .msg-messages::-webkit-scrollbar { width: 3px; }
    .msg-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Date divider */
    .msg-date-divider {
      text-align: center; font-size: 10px; color: var(--text2);
      letter-spacing: .08em; padding: 10px 0; opacity: .5;
    }

    /* Message bubble */
    .msg-bubble-wrap {
      display: flex; flex-direction: column;
      max-width: 68%; margin-bottom: 2px;
      animation: msgIn .2s ease forwards;
    }
    @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .msg-bubble-wrap.mine { align-self: flex-end; align-items: flex-end; }
    .msg-bubble-wrap.theirs { align-self: flex-start; align-items: flex-start; }

    .msg-bubble-nick {
      font-size: 10px; color: var(--accent); letter-spacing: .05em;
      margin-bottom: 3px; padding: 0 4px;
    }

    /* Reply quote */
    .msg-reply-quote {
      background: var(--bg3); border-left: 2px solid var(--accent);
      padding: 5px 8px; border-radius: 4px; margin-bottom: 4px;
      font-size: 11px; color: var(--text2); max-width: 100%;
    }
    .msg-reply-quote-nick { color: var(--accent); font-size: 10px; margin-bottom: 2px; }
    .msg-reply-quote-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .msg-bubble {
      padding: 9px 12px; border-radius: 12px;
      font-family: var(--font); font-size: 13px; line-height: 1.7;
      word-break: break-word; white-space: pre-wrap;
      position: relative; cursor: pointer;
    }
    .msg-bubble-wrap.mine .msg-bubble {
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg-bubble-wrap.theirs .msg-bubble {
      background: var(--bg3); color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    /* Media preview */
    .msg-media-preview {
      max-width: 100%; border-radius: 8px; overflow: hidden;
      margin-top: 6px; border: 1px solid var(--border);
    }
    .msg-media-preview img { max-width: 260px; max-height: 200px; object-fit: cover; display: block; }
    .msg-media-preview video { max-width: 260px; max-height: 200px; display: block; outline: none; }
    .msg-media-link {
      font-size: 11px; color: var(--accent); text-decoration: none;
      display: flex; align-items: center; gap: 4px; margin-top: 4px;
      opacity: .7;
    }
    .msg-media-link:hover { opacity: 1; }

    .msg-bubble-time {
      font-size: 9px; color: inherit; opacity: .45;
      margin-top: 3px; padding: 0 4px;
    }

    /* Reactions on bubble */
    .msg-reactions-row {
      display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; padding: 0 2px;
    }
    .msg-reaction-chip {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 12px; padding: 2px 7px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg3);
      cursor: pointer; transition: all .12s; user-select: none;
    }
    .msg-reaction-chip:hover { border-color: var(--border2); transform: scale(1.1); }
    .msg-reaction-chip.mine { border-color: var(--accent); background: rgba(80,120,255,.12); }
    .msg-reaction-chip span { font-size: 10px; color: var(--text2); }

    /* Reaction picker popup */
    .msg-react-picker {
      position: fixed; z-index: 1000;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 8px 10px;
      display: flex; gap: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      animation: fadeUp .15s ease;
    }
    .msg-react-pick-btn {
      font-size: 20px; cursor: pointer; padding: 4px;
      border-radius: 6px; transition: background .12s, transform .12s;
      border: none; background: none;
    }
    .msg-react-pick-btn:hover { background: var(--bg3); transform: scale(1.2); }

    /* Reply bar */
    .msg-reply-bar {
      display: none; align-items: center; gap: 10px;
      padding: 8px 20px; border-top: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
    }
    .msg-reply-bar.show { display: flex; }
    .msg-reply-bar-text { flex: 1; font-size: 12px; color: var(--text2); }
    .msg-reply-bar-nick { color: var(--accent); }
    .msg-reply-bar-close {
      font-size: 16px; color: var(--text2); cursor: pointer;
      background: none; border: none; padding: 0;
      transition: color .12s;
    }
    .msg-reply-bar-close:hover { color: var(--text); }

    /* Input area */
    .msg-input-area {
      padding: 12px 20px 14px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
      flex-shrink: 0;
    }
    .msg-input-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); font-size: 13px;
      padding: 9px 14px; outline: none; resize: none;
      min-height: 40px; max-height: 120px; line-height: 1.5;
      transition: border-color .15s, box-shadow .15s;
    }
    .msg-input:focus { border-color: var(--border2); box-shadow: 0 0 0 2px var(--glow); }
    .msg-input:disabled { opacity: .4; cursor: not-allowed; }
    .msg-media-btn {
      width: 40px; height: 40px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--text2); cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all .15s;
    }
    .msg-media-btn:hover { border-color: var(--border2); color: var(--text); }
    .msg-send-btn {
      width: 40px; height: 40px; border-radius: var(--radius);
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .12s;
    }
    .msg-send-btn:hover { background: var(--accent2); transform: scale(1.08); }
    .msg-send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .msg-send-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Media URL input row */
    .msg-media-row {
      display: none; align-items: center; gap: 8px;
    }
    .msg-media-row.show { display: flex; }
    .msg-media-url {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); font-size: 12px;
      padding: 7px 12px; outline: none;
      transition: border-color .15s;
    }
    .msg-media-url:focus { border-color: var(--border2); }
    .msg-media-type-btn {
      font-family: var(--font); font-size: 11px; padding: 7px 10px;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--bg3); color: var(--text2); cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    .msg-media-type-btn.active { border-color: var(--accent); color: var(--accent); }

    /* ══ NEW CHAT MODAL ══ */
    .msg-modal-overlay {
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .msg-modal-overlay.show { display: flex; }
    .msg-modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 16px; padding: 28px; width: 100%; max-width: 360px;
      animation: fadeUp .3s ease forwards;
    }
    .msg-modal-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px;
      letter-spacing: .06em; color: var(--text); margin-bottom: 16px;
    }
    .msg-modal-input {
      width: 100%; box-sizing: border-box;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); font-size: 13px;
      padding: 10px 14px; outline: none; margin-bottom: 12px;
      transition: border-color .15s;
    }
    .msg-modal-input:focus { border-color: var(--border2); }
    .msg-modal-error { font-size: 12px; color: #ff5060; margin-bottom: 10px; display: none; }
    .msg-modal-error.show { display: block; }
    .msg-modal-btns { display: flex; gap: 8px; }
    .msg-modal-ok {
      flex: 1; font-family: var(--font); font-size: 13px;
      padding: 10px; border-radius: var(--radius);
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; transition: background .15s;
    }
    .msg-modal-ok:hover { background: var(--accent2); }
    .msg-modal-cancel {
      font-family: var(--font); font-size: 13px;
      padding: 10px 16px; border-radius: var(--radius);
      background: var(--bg3); color: var(--text2);
      border: 1px solid var(--border); cursor: pointer; transition: all .15s;
    }
    .msg-modal-cancel:hover { border-color: var(--border2); color: var(--text); }

    /* ══ MOBILE ══ */
    @media (max-width: 640px) {
      .msg-left { width: 100%; position: absolute; inset: 0; z-index: 10; transition: transform .25s; }
      .msg-left.hidden { transform: translateX(-100%); }
      .msg-right { width: 100%; }
      .msg-chat-back {
        display: flex; align-items: center; justify-content: center;
        width: 32px; height: 32px; border-radius: 50%;
        background: var(--bg3); border: 1px solid var(--border);
        cursor: pointer; font-size: 14px; color: var(--text2);
        transition: all .15s; flex-shrink: 0;
      }
    }
    .msg-chat-back { display: none; }

    /* Presence dot */
    .pres-dot-wrap { position: relative; display: inline-block; flex-shrink: 0; }
    .pres-dot {
      position: absolute; bottom: 0; right: 0;
      width: 11px; height: 11px; border-radius: 50%;
      border: 2px solid var(--bg); box-sizing: border-box;
    }
    .pres-dot.online { background: #44dd66; box-shadow: 0 0 6px #44dd66; }
    .pres-dot.recent { background: #ffb020; }
    .pres-dot.offline { background: #555; }
    .msg-chat-status.online { color: #44dd66; }
    .msg-chat-status.recent { color: #ffb020; }
  </style>
</head>
<body>
<div class="msg-bg"></div>

<header class="site-header">
  <div class="header-logo">
    <img src="medele.png" alt="logo" class="logo-img" id="logoImg">
    <span class="logo-text" id="logoText" data-default="МапДев Вики" data-hover="кто кто?">МапДев Вики</span>
  </div>
  <nav class="header-nav">
    <a href="authors.html"  class="nav-btn" data-sound>Авторы</a>
    <a href="bloggers.html" class="nav-btn" data-sound>Блогеры</a>
    <a href="studios.html"  class="nav-btn" data-sound>Студии</a>
    <a href="events.html"   class="nav-btn" data-sound>Ивенты</a>
    <a href="posts.html"    class="nav-btn" data-sound>Посты</a>
  </nav>
  <button class="theme-toggle" id="themeToggle" data-sound><span class="theme-icon">🌙</span></button>
</header>

<!-- New chat modal -->
<div class="msg-modal-overlay" id="newChatModal">
  <div class="msg-modal">
    <div class="msg-modal-title">Новый диалог</div>
    <input class="msg-modal-input" id="newChatNickInput" placeholder="Введи ник собеседника..." maxlength="24" autocomplete="off" spellcheck="false">
    <div class="msg-modal-error" id="newChatError"></div>
    <div class="msg-modal-btns">
      <button class="msg-modal-cancel" id="newChatCancel">Отмена</button>
      <button class="msg-modal-ok" id="newChatOk">Начать чат →</button>
    </div>
  </div>
</div>

<!-- Create group/channel modal -->
<div class="msg-modal-overlay" id="groupModal">
  <div class="msg-modal">
    <div class="msg-modal-title" id="groupModalTitle">Новая группа</div>
    <input class="msg-modal-input" id="groupNameInput" placeholder="Название..." maxlength="40" autocomplete="off">
    <input class="msg-modal-input" id="groupAvatarInput" placeholder="Ссылка на аватарку (необязательно)" autocomplete="off">
    <div class="msg-modal-error" id="groupError"></div>
    <div class="msg-modal-btns">
      <button class="msg-modal-cancel" id="groupCancel">Отмена</button>
      <button class="msg-modal-ok" id="groupOk">Создать →</button>
    </div>
  </div>
</div>

<!-- Join channel modal -->
<div class="msg-modal-overlay" id="joinModal">
  <div class="msg-modal">
    <div class="msg-modal-title">Найти канал</div>
    <input class="msg-modal-input" id="joinNameInput" placeholder="Название канала..." maxlength="40" autocomplete="off">
    <div class="msg-modal-error" id="joinError"></div>
    <div class="msg-modal-btns">
      <button class="msg-modal-cancel" id="joinCancel">Отмена</button>
      <button class="msg-modal-ok" id="joinOk">Вступить →</button>
    </div>
  </div>
</div>

<!-- Add member modal -->
<div class="msg-modal-overlay" id="addMemberModal">
  <div class="msg-modal">
    <div class="msg-modal-title">Добавить участника</div>
    <input class="msg-modal-input" id="addMemberInput" placeholder="Ник пользователя..." maxlength="24" autocomplete="off">
    <div class="msg-modal-error" id="addMemberError"></div>
    <div class="msg-modal-btns">
      <button class="msg-modal-cancel" id="addMemberCancel">Отмена</button>
      <button class="msg-modal-ok" id="addMemberOk">Добавить →</button>
    </div>
  </div>
</div>

<!-- Reaction picker -->
<div class="msg-react-picker" id="reactPicker" style="display:none;">
  <button class="msg-react-pick-btn" data-emoji="👍">👍</button>
  <button class="msg-react-pick-btn" data-emoji="❤️">❤️</button>

          — <span id="replyBarText"></span>

<audio id="galochkaAudio" src="galochka.mp3" preload="auto"></audio>
<script src="script.js"></script>
<script src="firebase-wiki.js"></script>
<script src="presence.js"></script>
<script src="textformat.js"></script>
<script>
(function(){
  var REACTIONS = ['👍','❤️','😂','😮','😢','🔥'];

  var myNick    = null;
  var myDevId   = null;
  var myUid     = null;
  var db        = null;
  var currentDialog = null; /* { chatId, otherNick } */
  var replyTo   = null;     /* { msgId, nick, text } */
  var mediaType = 'image';
  var msgListener = null;
  var msgListenerRef = null;

  function safeKey(s){ return s.replace(/[.#$/\[\] ]/g,'_'); }
  var avatarCache = {};
  function getAvatar(nick, cb){
    if(avatarCache[nick] !== undefined){ cb(avatarCache[nick]); return; }
    db.ref('nick_index/'+safeKey(nick.toLowerCase())).once('value', function(s){
      var uid = s.val();
      if(!uid){ avatarCache[nick]=''; cb(''); return; }
      db.ref('profiles/'+safeKey(uid)+'/avatar').once('value', function(a){
        avatarCache[nick] = a.val()||'';
        cb(avatarCache[nick]);
      });
    });
  }
  function avatarEl(nick, av, size){
    if(av) return '<img src="'+esc(av)+'" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.outerHTML=\'<div style=&quot;width:'+size+'px;height:'+size+'px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+(size*0.42)+'px;flex-shrink:0;&quot;>'+esc(nick[0].toUpperCase())+'</div>\'">';
    return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+(size*0.42)+'px;flex-shrink:0;">'+esc(nick[0].toUpperCase())+'</div>';
  }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function chatId(a,b){ return [a,b].sort().join('__'); }

  function timeStr(ts){
    var d=new Date(ts);
    var now=new Date();
    var sameDay=d.toDateString()===now.toDateString();
    if(sameDay) return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    return d.getDate()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }

  function waitDB(cb){
    if(window.WikiDB && window.WikiDB.db){
      /* Ждём пока uid будет готов */
      if(window.WikiDB.uid){
        cb(window.WikiDB);
      } else if(window.WikiDB.onAuthReady){
        window.WikiDB.onAuthReady(function(){ cb(window.WikiDB); });
      } else {
        setTimeout(function(){ waitDB(cb); }, 200);
      }
    } else {
      setTimeout(function(){ waitDB(cb); }, 200);
    }
  }

  waitDB(function(wdb){
    db      = wdb.db;
    myDevId = wdb.deviceId;
    myUid   = wdb.uid || '';

    /* Load own nick — пробуем по uid, потом по deviceId (legacy) */
    var uidKey = safeKey(myUid);
    db.ref('nicknames/'+uidKey).once('value', function(snap){
      var nick = snap.val();
      if(nick){
        myNick = nick;
        init();
      } else {
        /* фоллбэк на старый deviceId ключ */
        db.ref('nicknames/'+safeKey(myDevId)).once('value', function(snap2){
          myNick = snap2.val() || null;
          init();
        });
      }
    });
  });

  function init(){
    if(window.TextFormat){ try{ window.TextFormat.attachToolbar(document.getElementById('msgInput')); }catch(e){} }
    if(!myNick){
      /* No nick — show message */
      document.getElementById('msgWelcome').innerHTML =
        '<div class="msg-nonick-icon">🔒</div>'+
        '<div class="msg-nonick-title">Нужен ник</div>'+
        '<div class="msg-nonick-sub">Чтобы пользоваться сообщениями,<br>сначала прокомментируй любую статью вики<br>— там выбирается ник.</div>';
      document.getElementById('newChatBtn').style.display='none';
      document.getElementById('dialogList').innerHTML='<div class="msg-empty-dialogs">Нет ника</div>';
      return;
    }

    loadDialogs();
    setupNewChat();
    setupMobile();
  }

  /* ════════════════════════════
     DIALOGS LIST (DMs + groups)
  ════════════════════════════ */
  var dmItems = [], groupItems = [];

  function loadDialogs(){
    /* DMs */
    db.ref('dm_index/'+safeKey(myNick)).on('value', function(snap){
      dmItems = [];
      if(snap.exists()) snap.forEach(function(ch){ dmItems.push({ kind:'dm', nick:ch.key, data:ch.val()||{} }); });
      mergeAndRender();
    });
    /* Groups/channels */
    db.ref('user_groups/'+safeKey(myNick)).on('value', function(snap){
      groupItems = [];
      if(!snap.exists()){ mergeAndRender(); return; }
      var gids = [];
      snap.forEach(function(ch){ gids.push(ch.key); });
      var loaded = 0;
      if(!gids.length){ mergeAndRender(); return; }
      gids.forEach(function(gid){
        db.ref('groups/'+gid).once('value', function(gs){
          if(gs.exists()){
            var g = gs.val();
            /* последнее сообщение */
            var lastMsg='', lastTs=g.createdTs||0;
            if(g.messages){
              var keys = Object.keys(g.messages);
              var last = g.messages[keys[keys.length-1]];
              if(last){ lastMsg = (last.nick?last.nick+': ':'')+(last.text||'📎 медиа'); lastTs = last.ts; }
            }
            groupItems.push({ kind:'group', gid:gid, data:g, lastMsg:lastMsg, lastTs:lastTs });
          }
          loaded++;
          if(loaded===gids.length) mergeAndRender();
        });
      });
    });
  }

  function mergeAndRender(){
    var all = [];
    dmItems.forEach(function(d){ all.push({ kind:'dm', nick:d.nick, data:d.data, lastTs:d.data.lastTs||0 }); });
    groupItems.forEach(function(g){ all.push({ kind:'group', gid:g.gid, gdata:g.data, lastMsg:g.lastMsg, lastTs:g.lastTs||0 }); });
    all.sort(function(a,b){ return (b.lastTs||0)-(a.lastTs||0); });
    renderDialogs(all);
  }

  function renderDialogs(items){
    var q = document.getElementById('dialogSearch').value.trim().toLowerCase();
    var list = document.getElementById('dialogList');
    list.innerHTML='';
    var filtered = items.filter(function(i){
      var name = i.kind==='dm' ? i.nick : (i.gdata?i.gdata.name:'');
      return !q || name.toLowerCase().includes(q);
    });
    if(!filtered.length){
      list.innerHTML='<div class="msg-empty-dialogs">Диалогов пока нет.<br>Создай первый!</div>'; return;
    }
    filtered.forEach(function(item){
      if(item.kind==='group') renderGroupItem(item, list);
      else renderDmItem(item, list);
    });
  }

  function renderGroupItem(item, list){
    var g = item.gdata;
    var isChannel = g.type==='channel';
    var el=document.createElement('div');
    el.className='msg-dialog-item'+(currentGroup&&currentGroup.gid===item.gid?' active':'');
    var iconHtml = g.avatar
      ? '<img src="'+esc(g.avatar)+'" style="width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;">'
      : '<div class="'+(isChannel?'msg-dialog-channel-icon':'msg-dialog-group-icon')+'">'+(isChannel?'📢':'👥')+'</div>';
    el.innerHTML =
      iconHtml +
      '<div class="msg-dialog-info">'+
        '<div class="msg-dialog-nick">'+(isChannel?'📢 ':'👥 ')+esc(g.name)+'</div>'+
        '<div class="msg-dialog-preview">'+esc((item.lastMsg||'').slice(0,40))+'</div>'+
      '</div>'+
      (item.lastTs?'<div class="msg-dialog-time">'+timeStr(item.lastTs)+'</div>':'');
    el.addEventListener('click',function(){ openGroup(item.gid); });
    list.appendChild(el);
  }

  function renderDmItem(item, list){
      var el=document.createElement('div');
      el.className='msg-dialog-item'+(currentDialog&&currentDialog.otherNick===item.nick?' active':'');
      var unread = item.data.unread>0;
      el.innerHTML=
        '<div class="pres-dot-wrap"><div class="msg-dialog-avatar-slot" style="display:inline-block;">'+avatarEl(item.nick, avatarCache[item.nick]||'', 38)+'</div><div class="pres-dot offline" data-presdot></div></div>'+
        '<div class="msg-dialog-info">'+
          '<div class="msg-dialog-nick">'+esc(item.nick)+'</div>'+
          '<div class="msg-dialog-preview">'+esc((item.data.lastMsg||'').slice(0,40))+'</div>'+
        '</div>'+
        (item.data.lastTs?'<div class="msg-dialog-time">'+timeStr(item.data.lastTs)+'</div>':'')+
        (unread?'<div class="msg-unread-dot"></div>':'');
      el.addEventListener('click',function(){ openChat(item.nick); });
      list.appendChild(el);

      /* Подгружаем аватарку асинхронно */
      if(avatarCache[item.nick]===undefined){
        getAvatar(item.nick, function(av){
          var slot = el.querySelector('.msg-dialog-avatar-slot');
          if(slot) slot.innerHTML = avatarEl(item.nick, av, 38);
        });
      }
      /* Онлайн-статус — точка на аватарке */
      if(window.WikiPresence){
        window.WikiPresence.watch(item.nick, function(status){
          var dot = el.querySelector('[data-presdot]');
          if(dot) dot.className = 'pres-dot ' + status;
        });
      }
  }

  document.getElementById('dialogSearch').addEventListener('input', function(){
    mergeAndRender();
  });

  /* ════════════════════════════
     OPEN CHAT
  ════════════════════════════ */
  function openChat(otherNick){
    var cid = chatId(safeKey(myNick), safeKey(otherNick));
    currentDialog = { chatId: cid, otherNick: otherNick };
    currentGroup = null;
    /* Убираем manage-кнопку и readonly от групп */
    var head = document.getElementById('msgChatHead');
    var oldManage = head.querySelector('.msg-chat-manage');
    if(oldManage) oldManage.remove();
    var ro = document.getElementById('channelReadonly');
    if(ro) ro.remove();
    document.querySelector('.msg-input-area').style.display = 'flex';

    /* Update UI */
    var chatAvatarEl = document.getElementById('chatAvatar');
    chatAvatarEl.innerHTML = avatarEl(otherNick, avatarCache[otherNick]||'', 36);
    getAvatar(otherNick, function(av){
      var slot = document.getElementById('chatAvatar');
      if(slot) slot.innerHTML = avatarEl(otherNick, av, 36);
    });
    document.getElementById('chatNick').innerHTML = '<a href="profile.html?nick='+encodeURIComponent(otherNick)+'" style="color:inherit;text-decoration:none;">'+esc(otherNick)+'</a>';
    /* Онлайн-статус собеседника */
    var statusEl = document.getElementById('chatStatus');
    if(window.WikiPresence){
      window.WikiPresence.watch(otherNick, function(status){
        statusEl.className = 'msg-chat-status ' + status;
        statusEl.textContent = window.WikiPresence.labelOf(status);
      });
    }
    document.getElementById('msgWelcome').style.display = 'none';
    var chatView = document.getElementById('msgChatView');
    chatView.style.display='flex';

    document.getElementById('msgInput').disabled = false;
    document.getElementById('msgSendBtn').disabled = false;

    /* Mark active dialog */
    document.querySelectorAll('.msg-dialog-item').forEach(function(el){ el.classList.remove('active'); });
    document.querySelectorAll('.msg-dialog-item').forEach(function(el){
      if(el.querySelector('.msg-dialog-nick').textContent===otherNick) el.classList.add('active');
    });

    /* Clear unread */
    db.ref('dm_index/'+safeKey(myNick)+'/'+safeKey(otherNick)+'/unread').set(0);

    /* Remove old listener */
    if(msgListenerRef && msgListener){ try{ msgListenerRef.off('value', msgListener); }catch(e){} }

    /* Mobile: hide left panel */
    if(window.innerWidth<=640){
      document.getElementById('msgLeft').classList.add('hidden');
    }

    /* Load messages */
    var msgsRef = db.ref('dms/'+cid+'/messages').orderByChild('ts').limitToLast(80);
    msgListenerRef = msgsRef;
    msgListener = msgsRef.on('value', function(snap){
      renderMessages(snap);
    });
  }

  /* ════════════════════════════
     RENDER MESSAGES
  ════════════════════════════ */
  function renderMessages(snap){
    var container = document.getElementById('msgMessages');
    var wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
    container.innerHTML='';

    if(!snap||!snap.exists()){
      container.innerHTML='<div style="text-align:center;color:var(--text2);font-size:12px;opacity:.45;padding:40px;">Начни разговор!</div>';
      return;
    }

    var lastDate = null;
    snap.forEach(function(ch){
      var msg = ch.val(); var msgId = ch.key;
      var d = new Date(msg.ts);
      var dateStr = d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
      if(dateStr!==lastDate){
        var sep=document.createElement('div'); sep.className='msg-date-divider'; sep.textContent=dateStr;
        container.appendChild(sep); lastDate=dateStr;
      }
      container.appendChild(buildBubble(msgId, msg));
    });

    if(wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  function buildBubble(msgId, msg){
    var isMine = msg.nick===myNick;
    var wrap=document.createElement('div');
    wrap.className='msg-bubble-wrap '+(isMine?'mine':'theirs');
    wrap.dataset.msgid = msgId;

    if(!isMine){
      var nickEl=document.createElement('div'); nickEl.className='msg-bubble-nick'; nickEl.textContent=msg.nick;
      wrap.appendChild(nickEl);
    }

    /* Reply quote */
    if(msg.replyTo){
      var q=document.createElement('div'); q.className='msg-reply-quote';
      q.innerHTML='<div class="msg-reply-quote-nick">'+esc(msg.replyTo.nick)+'</div>'+
        '<div class="msg-reply-quote-text">'+esc((msg.replyTo.text||'📎 медиа').slice(0,60))+'</div>';
      wrap.appendChild(q);
    }

    /* Bubble */
    var bubble=document.createElement('div'); bubble.className='msg-bubble';
    if(msg.text){ var tspan=document.createElement('span'); tspan.innerHTML=(window.TextFormat?window.TextFormat.render(msg.text):esc(msg.text)); bubble.appendChild(tspan); }

    /* Media */
    if(msg.mediaUrl){
      var mprev=document.createElement('div'); mprev.className='msg-media-preview';
      if(msg.mediaType==='video'){
        mprev.innerHTML='<video src="'+esc(msg.mediaUrl)+'" controls playsinline muted style="max-width:260px;max-height:200px;"></video>';
      } else {
        mprev.innerHTML='<img src="'+esc(msg.mediaUrl)+'" style="max-width:260px;max-height:200px;object-fit:cover;" onerror="this.style.display=\'none\'">';
      }
      var mlink=document.createElement('a'); mlink.className='msg-media-link';
      mlink.href=msg.mediaUrl; mlink.target='_blank'; mlink.textContent='🔗 Открыть';
      bubble.appendChild(mprev); bubble.appendChild(mlink);
    }

    /* Time */
    var timeEl=document.createElement('div'); timeEl.className='msg-bubble-time'; timeEl.textContent=timeStr(msg.ts);
    bubble.appendChild(timeEl);

    /* Click → show reaction picker */
    bubble.addEventListener('click', function(e){
      e.stopPropagation();
      showReactPicker(msgId, e.clientX, e.clientY);
    });

    /* Long press → reply (mobile) */
    var pressTimer;
    bubble.addEventListener('touchstart', function(){ pressTimer=setTimeout(function(){ setReplyTo(msgId, msg); },500); });
    bubble.addEventListener('touchend',   function(){ clearTimeout(pressTimer); });

    /* Right click → reply */
    bubble.addEventListener('contextmenu', function(e){ e.preventDefault(); setReplyTo(msgId, msg); });

    wrap.appendChild(bubble);

    /* Reactions */
    if(msg.reactions){
      var rrow=document.createElement('div'); rrow.className='msg-reactions-row';
      Object.keys(msg.reactions).forEach(function(key){
        var users=msg.reactions[key]||{};
        var count=Object.keys(users).length; if(!count) return;
        var mine=!!users[safeKey(myNick)];
        var emoji=decodeEmoji(key);
        var chip=document.createElement('div');
        chip.className='msg-reaction-chip'+(mine?' mine':'');
        chip.innerHTML=emoji+'<span>'+count+'</span>';
        chip.addEventListener('click',function(e){ e.stopPropagation(); toggleReaction(msgId,key,mine); });
        rrow.appendChild(chip);
      });
      if(rrow.children.length) wrap.appendChild(rrow);
    }

    return wrap;
  }

  /* ════════════════════════════
     REACTION PICKER
  ════════════════════════════ */
  var pickerMsgId=null;
  function showReactPicker(msgId, x, y){
    pickerMsgId=msgId;
    var p=document.getElementById('reactPicker');
    p.style.display='flex';
    /* Position */
    var pw=p.offsetWidth||200, ph=p.offsetHeight||50;
    var left=Math.min(x, window.innerWidth-pw-10);
    var top=y-ph-10;
    if(top<10) top=y+10;
    p.style.left=left+'px'; p.style.top=top+'px';
  }
  document.getElementById('reactPicker').querySelectorAll('.msg-react-pick-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      if(!pickerMsgId||!currentDialog) return;
      var emoji=btn.dataset.emoji;
      var base=msgBasePath(); if(!base) return;
      var ref=db.ref(base+pickerMsgId+'/reactions/'+encodeEmoji(emoji)+'/'+safeKey(myNick));
      ref.once('value',function(snap){ snap.val() ? ref.remove() : ref.set(true); });
      document.getElementById('reactPicker').style.display='none';
    });
  });
  document.addEventListener('click',function(){ document.getElementById('reactPicker').style.display='none'; });

  function msgBasePath(){
    if(currentGroup) return 'groups/'+currentGroup.gid+'/messages/';
    if(currentDialog) return 'dms/'+currentDialog.chatId+'/messages/';
    return null;
  }

  function toggleReaction(msgId,key,isMine){
    var base = msgBasePath(); if(!base) return;
    var ref=db.ref(base+msgId+'/reactions/'+key+'/'+safeKey(myNick));
    isMine ? ref.remove() : ref.set(true);
  }

  var EMOJI_KEYS = {'👍':'like','❤️':'heart','😂':'lol','😮':'wow','😢':'sad','🔥':'fire'};
  var EMOJI_FROM_KEY = {'like':'👍','heart':'❤️','lol':'😂','wow':'😮','sad':'😢','fire':'🔥'};
  function encodeEmoji(e){ return EMOJI_KEYS[e] || e.codePointAt(0).toString(16); }
  function decodeEmoji(k){ return EMOJI_FROM_KEY[k] || k; }

  /* ════════════════════════════
     REPLY
  ════════════════════════════ */
  function setReplyTo(msgId, msg){
    replyTo={msgId:msgId, nick:msg.nick, text:msg.text||'📎 медиа'};
    document.getElementById('replyBarNick').textContent=msg.nick;
    document.getElementById('replyBarText').textContent=(msg.text||'📎 медиа').slice(0,50);
    document.getElementById('replyBar').classList.add('show');
    document.getElementById('msgInput').focus();
  }
  document.getElementById('replyBarClose').addEventListener('click',function(){
    replyTo=null;
    document.getElementById('replyBar').classList.remove('show');
  });

  /* ════════════════════════════
     MEDIA TOGGLE
  ════════════════════════════ */
  document.getElementById('mediaToggleBtn').addEventListener('click',function(){
    document.getElementById('mediaRow').classList.toggle('show');
  });
  document.getElementById('mediaTypeImg').addEventListener('click',function(){
    mediaType='image';
    this.classList.add('active');
    document.getElementById('mediaTypeVid').classList.remove('active');
  });
  document.getElementById('mediaTypeVid').addEventListener('click',function(){
    mediaType='video';
    this.classList.add('active');
    document.getElementById('mediaTypeImg').classList.remove('active');
  });

  /* ════════════════════════════
     SEND MESSAGE
  ════════════════════════════ */
  function sendMessage(){
    if(!myNick) return;

    var text   = document.getElementById('msgInput').value.trim();
    var media  = document.getElementById('mediaUrlInput').value.trim();
    if(!text&&!media) return;

    var msg={ nick: myNick, uid: myUid, text: text, ts: Date.now() };
    if(media){ msg.mediaUrl=media; msg.mediaType=mediaType; }
    if(replyTo){ msg.replyTo={ msgId:replyTo.msgId, nick:replyTo.nick, text:replyTo.text }; }

    function clearInputs(){
      document.getElementById('msgInput').value='';
      document.getElementById('mediaUrlInput').value='';
      document.getElementById('mediaRow').classList.remove('show');
      replyTo=null;
      document.getElementById('replyBar').classList.remove('show');
      var c=document.getElementById('msgMessages');
      setTimeout(function(){ c.scrollTop=c.scrollHeight; },100);
    }

    /* ── Группа/канал ── */
    if(currentGroup){
      var g = currentGroup.data;
      if(g.type==='channel' && g.owner!==myNick) return; /* в канале пишет только владелец */
      db.ref('groups/'+currentGroup.gid+'/messages').push(msg, function(err){
        if(err) return;
        if(myUid){ var pr=db.ref('profiles/'+safeKey(myUid)); pr.child('msgCount').transaction(function(v){return (v||0)+1;}); pr.child('nick').set(myNick); }
        clearInputs();
      });
      return;
    }

    /* ── Личка ── */
    if(!currentDialog) return;
    var cid=currentDialog.chatId;
    var otherNick=currentDialog.otherNick;

    db.ref('dms/'+cid+'/messages').push(msg, function(err){
      if(err) return;
      var preview=(text||'📎 медиа').slice(0,50);
      var ts=msg.ts;
      db.ref('dm_index/'+safeKey(myNick)+'/'+safeKey(otherNick)).set({ lastMsg:preview, lastTs:ts, unread:0 });
      if(myUid){ var pr=db.ref('profiles/'+safeKey(myUid)); pr.child('msgCount').transaction(function(v){return (v||0)+1;}); pr.child('nick').set(myNick); pr.child('joinedTs').transaction(function(v){return v||Date.now();}); }
      db.ref('dm_index/'+safeKey(otherNick)+'/'+safeKey(myNick)).transaction(function(cur){
        cur=cur||{};
        cur.lastMsg=preview; cur.lastTs=ts;
        cur.unread=(cur.unread||0)+1;
        return cur;
      });
      clearInputs();
    });
  }

  document.getElementById('msgSendBtn').addEventListener('click',sendMessage);
  document.getElementById('msgInput').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
  });

  /* Auto-resize textarea */
  document.getElementById('msgInput').addEventListener('input',function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,120)+'px';
  });

  /* ════════════════════════════
     CREATE MENU (chat/group/channel/join)
  ════════════════════════════ */
  function setupNewChat(){
    var menu = document.getElementById('newMenu');

    document.getElementById('newChatBtn').addEventListener('click',function(e){
      e.stopPropagation();
      menu.classList.toggle('show');
    });
    document.addEventListener('click',function(){ menu.classList.remove('show'); });
    menu.addEventListener('click',function(e){ e.stopPropagation(); });

    menu.querySelectorAll('[data-create]').forEach(function(btn){
      btn.addEventListener('click',function(){
        menu.classList.remove('show');
        var type = btn.dataset.create;
        if(type==='chat') openNewChatModal();
        else if(type==='group') openGroupModal('group');
        else if(type==='channel') openGroupModal('channel');
        else if(type==='join') openJoinModal();
      });
    });

    /* ── New chat modal ── */
    function openNewChatModal(){
      document.getElementById('newChatModal').classList.add('show');
      document.getElementById('newChatNickInput').value='';
      document.getElementById('newChatError').classList.remove('show');
      setTimeout(function(){ document.getElementById('newChatNickInput').focus(); },100);
    }
    document.getElementById('newChatCancel').addEventListener('click',function(){
      document.getElementById('newChatModal').classList.remove('show');
    });
    document.getElementById('newChatModal').addEventListener('click',function(e){
      if(e.target===this) this.classList.remove('show');
    });
    document.getElementById('newChatOk').addEventListener('click',startNewChat);
    document.getElementById('newChatNickInput').addEventListener('keydown',function(e){
      if(e.key==='Enter') startNewChat();
    });

    /* ── Group/Channel create modal ── */
    var createType = 'group';
    function openGroupModal(type){
      createType = type;
      document.getElementById('groupModalTitle').textContent = type==='group' ? 'Новая группа' : 'Новый канал';
      document.getElementById('groupNameInput').value='';
      document.getElementById('groupAvatarInput').value='';
      document.getElementById('groupError').classList.remove('show');
      document.getElementById('groupModal').classList.add('show');
      setTimeout(function(){ document.getElementById('groupNameInput').focus(); },100);
    }
    document.getElementById('groupCancel').addEventListener('click',function(){
      document.getElementById('groupModal').classList.remove('show');
    });
    document.getElementById('groupModal').addEventListener('click',function(e){
      if(e.target===this) this.classList.remove('show');
    });
    document.getElementById('groupOk').addEventListener('click',function(){ createGroup(createType); });

    /* ── Join channel modal ── */
    function openJoinModal(){
      document.getElementById('joinNameInput').value='';
      document.getElementById('joinError').classList.remove('show');
      document.getElementById('joinModal').classList.add('show');
      setTimeout(function(){ document.getElementById('joinNameInput').focus(); },100);
    }
    document.getElementById('joinCancel').addEventListener('click',function(){
      document.getElementById('joinModal').classList.remove('show');
    });
    document.getElementById('joinModal').addEventListener('click',function(e){
      if(e.target===this) this.classList.remove('show');
    });
    document.getElementById('joinOk').addEventListener('click',joinChannel);
    document.getElementById('joinNameInput').addEventListener('keydown',function(e){
      if(e.key==='Enter') joinChannel();
    });
  }

  function startNewChat(){
    var nick=document.getElementById('newChatNickInput').value.trim();
    var errEl=document.getElementById('newChatError');
    function showErr(msg){ errEl.textContent=msg; errEl.classList.add('show'); }
    if(!nick){ showErr('Введи ник'); return; }
    if(nick===myNick){ showErr('Нельзя написать самому себе'); return; }

    db.ref('nick_index/'+nick.toLowerCase()).once('value',function(snap){
      if(!snap.exists()){ showErr('Пользователь с таким ником не найден'); return; }
      document.getElementById('newChatModal').classList.remove('show');
      db.ref('dm_index/'+safeKey(myNick)+'/'+safeKey(nick)).once('value',function(s){
        if(!s.exists()) db.ref('dm_index/'+safeKey(myNick)+'/'+safeKey(nick)).set({ lastMsg:'', lastTs:Date.now(), unread:0 });
        openChat(nick);
      });
    });
  }

  /* ════════════════════════════
     CREATE GROUP / CHANNEL
  ════════════════════════════ */
  function createGroup(type){
    var name = document.getElementById('groupNameInput').value.trim();
    var avatar = document.getElementById('groupAvatarInput').value.trim();
    var errEl = document.getElementById('groupError');
    function showErr(m){ errEl.textContent=m; errEl.classList.add('show'); }
    if(name.length < 2){ showErr('Название минимум 2 символа'); return; }

    if(type==='channel'){
      /* Проверяем уникальность названия канала */
      db.ref('channels_public/'+safeKey(name.toLowerCase())).once('value',function(snap){
        if(snap.exists()){ showErr('Канал с таким названием уже есть'); return; }
        doCreate();
      });
    } else {
      doCreate();
    }

    function doCreate(){
      var gid = db.ref('groups').push().key;
      var members = {}; members[safeKey(myNick)] = true;
      var groupData = {
        name: name, type: type, owner: myNick,
        avatar: avatar, createdTs: Date.now(), members: members
      };
      var updates = {};
      updates['groups/'+gid] = groupData;
      updates['user_groups/'+safeKey(myNick)+'/'+gid] = true;
      if(type==='channel'){
        updates['channels_public/'+safeKey(name.toLowerCase())] = gid;
      }
      db.ref().update(updates, function(err){
        if(err){ showErr('Ошибка создания'); return; }
        document.getElementById('groupModal').classList.remove('show');
        openGroup(gid);
      });
    }
  }

  /* ════════════════════════════
     JOIN CHANNEL BY NAME
  ════════════════════════════ */
  function joinChannel(){
    var name = document.getElementById('joinNameInput').value.trim();
    var errEl = document.getElementById('joinError');
    function showErr(m){ errEl.textContent=m; errEl.classList.add('show'); }
    if(!name){ showErr('Введи название'); return; }

    db.ref('channels_public/'+safeKey(name.toLowerCase())).once('value',function(snap){
      var gid = snap.val();
      if(!gid){ showErr('Канал не найден'); return; }
      var updates = {};
      updates['groups/'+gid+'/members/'+safeKey(myNick)] = true;
      updates['user_groups/'+safeKey(myNick)+'/'+gid] = true;
      db.ref().update(updates, function(err){
        if(err){ showErr('Ошибка вступления'); return; }
        document.getElementById('joinModal').classList.remove('show');
        openGroup(gid);
      });
    });
  }

  /* ════════════════════════════
     OPEN GROUP / CHANNEL
  ════════════════════════════ */
  var currentGroup = null; /* {gid, data} */

  function openGroup(gid){
    db.ref('groups/'+gid).once('value', function(snap){
      if(!snap.exists()) return;
      var g = snap.val();
      currentGroup = { gid: gid, data: g };
      currentDialog = null;

      /* Header */
      var isChannel = g.type === 'channel';
      var isOwner = g.owner === myNick;
      var memberCount = g.members ? Object.keys(g.members).length : 0;

      var chatAvatarEl = document.getElementById('chatAvatar');
      chatAvatarEl.innerHTML = g.avatar
        ? '<img src="'+esc(g.avatar)+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">'
        : '<div class="'+(isChannel?'msg-dialog-channel-icon':'msg-dialog-group-icon')+'" style="width:36px;height:36px;">'+(isChannel?'📢':'👥')+'</div>';

      document.getElementById('chatNick').textContent = g.name;
      var statusEl = document.getElementById('chatStatus');
      statusEl.className = 'msg-chat-status';
      statusEl.textContent = (isChannel?'Канал':'Группа')+' · '+memberCount+' участн.';

      /* Manage button for owner */
      var head = document.getElementById('msgChatHead');
      var oldManage = head.querySelector('.msg-chat-manage');
      if(oldManage) oldManage.remove();
      if(isOwner && !isChannel){
        var manageBtn = document.createElement('button');
        manageBtn.className = 'msg-chat-manage';
        manageBtn.textContent = '➕ Участник';
        manageBtn.addEventListener('click', function(){ openAddMember(gid); });
        head.appendChild(manageBtn);
      }

      document.getElementById('msgWelcome').style.display = 'none';
      document.getElementById('msgChatView').style.display = 'flex';

      if(window.innerWidth<=640) document.getElementById('msgLeft').classList.add('hidden');

      /* Права на запись: в канале только владелец */
      var canWrite = !isChannel || isOwner;
      var inputArea = document.querySelector('.msg-input-area');
      var readonlyNotice = document.getElementById('channelReadonly');
      if(readonlyNotice) readonlyNotice.remove();
      if(canWrite){
        inputArea.style.display = 'flex';
        document.getElementById('msgInput').disabled = false;
        document.getElementById('msgSendBtn').disabled = false;
      } else {
        inputArea.style.display = 'none';
        var notice = document.createElement('div');
        notice.id = 'channelReadonly';
        notice.className = 'msg-channel-readonly';
        notice.textContent = '📢 Только владелец канала может писать сообщения';
        inputArea.parentNode.appendChild(notice);
      }

      /* Load messages */
      if(msgListenerRef && msgListener){ try{ msgListenerRef.off('value', msgListener); }catch(e){} }
      var msgsRef = db.ref('groups/'+gid+'/messages').orderByChild('ts').limitToLast(80);
      msgListenerRef = msgsRef;
      msgListener = msgsRef.on('value', function(snap){ renderMessages(snap); });
    });
  }

  /* Add member (owner only, groups) */
  var addMemberGid = null;
  function openAddMember(gid){
    addMemberGid = gid;
    document.getElementById('addMemberInput').value='';
    document.getElementById('addMemberError').classList.remove('show');
    document.getElementById('addMemberModal').classList.add('show');
    setTimeout(function(){ document.getElementById('addMemberInput').focus(); },100);
  }
  document.getElementById('addMemberCancel').addEventListener('click',function(){
    document.getElementById('addMemberModal').classList.remove('show');
  });
  document.getElementById('addMemberModal').addEventListener('click',function(e){
    if(e.target===this) this.classList.remove('show');
  });
  document.getElementById('addMemberOk').addEventListener('click',function(){
    var nick = document.getElementById('addMemberInput').value.trim();
    var errEl = document.getElementById('addMemberError');
    function showErr(m){ errEl.textContent=m; errEl.classList.add('show'); }
    if(!nick){ showErr('Введи ник'); return; }
    db.ref('nick_index/'+nick.toLowerCase()).once('value',function(snap){
      if(!snap.exists()){ showErr('Пользователь не найден'); return; }
      var updates = {};
      updates['groups/'+addMemberGid+'/members/'+safeKey(nick)] = true;
      updates['user_groups/'+safeKey(nick)+'/'+addMemberGid] = true;
      db.ref().update(updates, function(err){
        if(err){ showErr('Ошибка'); return; }
        document.getElementById('addMemberModal').classList.remove('show');
      });
    });
  });

  /* ════════════════════════════
     MOBILE BACK
  ════════════════════════════ */
  function setupMobile(){
    document.getElementById('msgChatBack').addEventListener('click',function(){
      document.getElementById('msgLeft').classList.remove('hidden');
      currentDialog=null; currentGroup=null;
      document.getElementById('msgChatView').style.display='none';
      document.getElementById('msgWelcome').style.display='flex';
    });
  }

})();
</script>
</body>
</html>
