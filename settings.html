<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки — МапДев Вики</title>
  <link rel="icon" type="image/png" href="fav.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    html, body { overflow-y: auto; }

    .settings-page {
      min-height: 100vh;
      padding-top: var(--hh);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-bottom: 80px;
    }

    .settings-wrap {
      width: 100%;
      max-width: 680px;
      padding: 52px 36px 0;
    }

    /* ── Header ── */
    .settings-title {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-size: clamp(36px, 6vw, 56px);
      letter-spacing: .06em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 18px;
      opacity: 0; animation: fadeUp .6s ease forwards;
    }
    .settings-title svg {
      width: 44px; height: 44px;
      fill: #888899;
      animation: spinSlow 8s linear infinite;
    }
    @keyframes spinSlow { to { transform: rotate(360deg); } }

    .settings-subtitle {
      font-size: 13px; color: var(--text2);
      margin-top: 8px; letter-spacing: .04em;
      opacity: 0; animation: fadeUp .6s ease .15s forwards;
    }

    .settings-divider {
      height: 1px; background: var(--border);
      margin: 28px 0 36px;
      opacity: 0; animation: fadeUp .5s ease .2s forwards;
    }

    /* ── Two-column split ── */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      opacity: 0; animation: fadeUp .7s ease .3s forwards;
    }

    .settings-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .settings-block:hover { border-color: var(--border2); }

    .block-title {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Scale control ── */
    .scale-display {
      font-size: 42px;
      font-family: 'Bebas Neue', monospace;
      letter-spacing: .04em;
      color: var(--text);
      text-align: center;
      padding: 8px 0;
    }
    .scale-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .scale-track {
      flex: 1; height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      position: relative; overflow: hidden;
    }
    .scale-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px;
      transition: width .2s ease;
    }
    .s-btn {
      width: 36px; height: 36px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 20px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, transform .15s;
      flex-shrink: 0;
      font-family: monospace;
    }
    .s-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.08); }
    .scale-presets {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .scale-preset {
      font-family: var(--font);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .scale-preset:hover, .scale-preset.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--bg2);
    }

    /* ── Font control ── */
    .font-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .font-item {
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg3);
      cursor: pointer;
      transition: all .18s;
      display: flex; flex-direction: column; gap: 4px;
    }
    .font-item:hover { border-color: var(--border2); background: var(--bg2); }
    .font-item.active {
      border-color: var(--accent);
      background: var(--bg2);
      box-shadow: 0 0 12px var(--glow);
    }
    .font-name {
      font-size: 13px; color: var(--text); font-weight: bold;
    }
    .font-preview {
      font-size: 13px; color: var(--text2); opacity: .8;
    }

    /* ── Theme row ── */
    .theme-row {
      display: flex; gap: 10px;
      opacity: 0; animation: fadeUp .7s ease .45s forwards;
    }
    .theme-card {
      flex: 1; padding: 16px;
      border-radius: 8px; border: 2px solid var(--border);
      cursor: pointer; transition: all .18s;
      text-align: center; font-size: 13px;
    }
    .theme-card:hover { border-color: var(--border2); }
    .theme-card.active { border-color: var(--accent); box-shadow: 0 0 14px var(--glow); }
    .theme-card .theme-icon { font-size: 28px; display: block; margin-bottom: 8px; }
    .theme-card.dark-card  { background: #111118; color: #eeeef5; }
    .theme-card.light-card { background: #e6ece0; color: #0e0e0e; border-color: rgba(70,160,45,.25); }
    .theme-card.light-card.active { border-color: #52a81e; box-shadow: 0 0 14px rgba(82,168,30,.3); }

    /* ── Reset ── */
    .reset-btn {
      font-family: var(--font); font-size: 12px;
      padding: 10px 20px; border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text2);
      cursor: pointer; transition: all .15s;
      opacity: 0; animation: fadeUp .6s ease .55s forwards;
      align-self: flex-start;
    }
    .reset-btn:hover { border-color: #e05555; color: #e05555; background: rgba(224,85,85,.08); }

    /* back */
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font); font-size: 12px; letter-spacing: .06em;
      color: var(--text2); text-decoration: none;
      margin-top: 48px;
      opacity: 0; animation: fadeUp .6s ease .6s forwards;
      transition: color .15s;
    }
    .back-link:hover { color: var(--accent); }

    @media(max-width: 600px) {
      .settings-grid { grid-template-columns: 1fr; }
      .settings-wrap { padding: 36px 18px 0; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-logo">
    <img src="medele.png" alt="logo" class="logo-img" id="logoImg">
    <span class="logo-text" id="logoText" data-default="МапДев Вики" data-hover="кто кто?">МапДев Вики</span>
  </div>
  <nav class="header-nav">
    <a href="authors.html"  class="nav-btn" data-sound>Авторы</a>
    <a href="bloggers.html" class="nav-btn" data-sound>Блогеры</a>
    <a href="studios.html"  class="nav-btn" data-sound>Студии</a>
    <a href="events.html"   class="nav-btn" data-sound>Ивенты</a>
  </nav>
  <button class="theme-toggle" id="themeToggle" data-sound><span class="theme-icon">🌙</span></button>
</header>

<div class="settings-page">
  <div class="settings-wrap">

    <h1 class="settings-title">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.02 7.02 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.47.47 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/>
      </svg>
      Настройки
    </h1>
    <p class="settings-subtitle">Настрой сайт под себя — всё сохраняется автоматически</p>
    <div class="settings-divider"></div>

    <!-- Scale + Font grid -->
    <div class="settings-grid">

      <!-- Scale block -->
      <div class="settings-block">
        <div class="block-title">⊞ Масштаб</div>
        <div class="scale-display" id="scaleDisplay">100%</div>
        <div class="scale-bar">
          <button class="s-btn" id="scaleMinus">−</button>
          <div class="scale-track">
            <div class="scale-fill" id="scaleFill" style="width:33%"></div>
          </div>
          <button class="s-btn" id="scalePlus">+</button>
        </div>
        <div class="scale-presets">
          <button class="scale-preset" data-val="80">80%</button>
          <button class="scale-preset" data-val="90">90%</button>
          <button class="scale-preset active" data-val="100">100%</button>
          <button class="scale-preset" data-val="110">110%</button>
          <button class="scale-preset" data-val="120">120%</button>
          <button class="scale-preset" data-val="130">130%</button>
          <button class="scale-preset" data-val="140">140%</button>
        </div>
      </div>

      <!-- Font block -->
      <div class="settings-block">
        <div class="block-title">A Шрифт текста</div>
        <div class="font-list">

          <div class="font-item active" data-font-id="default">
            <span class="font-name">По умолчанию</span>
            <span class="font-preview" style="font-family:'MC','Courier New',monospace">Пример текста</span>
          </div>

          <div class="font-item" data-font-id="readable">
            <span class="font-name">Читаемый</span>
            <span class="font-preview" style="font-family:'Trebuchet MS',sans-serif">Пример текста</span>
          </div>

          <div class="font-item" data-font-id="mc">
            <span class="font-name">Minecraft Rus</span>
            <span class="font-preview" style="font-family:'Courier New',monospace;letter-spacing:.05em">Пример текста</span>
          </div>

          <div class="font-item" data-font-id="mc2">
            <span class="font-name">MC Classic</span>
            <span class="font-preview" style="font-family:monospace">Пример текста</span>
          </div>

        </div>
      </div>

    </div>

    <!-- Theme chooser -->
    <div class="settings-divider" style="margin-top:28px"></div>
    <div class="block-title" style="margin-bottom:12px;opacity:0;animation:fadeUp .6s ease .4s forwards">🎨 Тема</div>
    <div class="theme-row">
      <div class="theme-card dark-card active" data-theme-val="dark">
        <span class="theme-icon">🌙</span>
        Тёмная
      </div>
      <div class="theme-card light-card" data-theme-val="light">
        <span class="theme-icon">☀️</span>
        Светлая
      </div>
    </div>

    <!-- Reset -->
    <button class="reset-btn" id="resetBtn">↺ Сбросить настройки</button>

    <a href="javascript:history.back()" class="back-link">← Назад</a>

  </div>
</div>

<audio id="galochkaAudio" src="galochka.mp3" preload="auto"></audio>
<script src="script.js"></script>
<script>
(function() {
  var SCALE_KEY = 'siteScale';
  var FONT_KEY  = 'siteFont';

  var FONT_CSS = {
    'default':  "'MC', 'Courier New', monospace",
    'readable': "'Trebuchet MS', sans-serif",
    'mc':       "'MinecraftRus', 'Courier New', monospace",
    'mc2':      "monospace"
  };
  var MIN = 80, MAX = 140, STEP = 10;

  var scale = parseInt(localStorage.getItem(SCALE_KEY) || '100', 10);
  var font  = localStorage.getItem(FONT_KEY) || 'default';

  function applyScale(v) {
    document.documentElement.style.zoom = v / 100;
    localStorage.setItem(SCALE_KEY, v);
    document.getElementById('scaleDisplay').textContent = v + '%';
    // fill bar: 80→0%, 140→100%
    var pct = ((v - MIN) / (MAX - MIN)) * 100;
    document.getElementById('scaleFill').style.width = pct + '%';
    // presets active state
    document.querySelectorAll('.scale-preset').forEach(function(b){
      b.classList.toggle('active', parseInt(b.dataset.val) === v);
    });
  }

  function applyFont(id) {
    var css = FONT_CSS[id] || FONT_CSS['default'];
    document.documentElement.style.setProperty('--font', css);
    localStorage.setItem(FONT_KEY, id);
    document.querySelectorAll('.font-item').forEach(function(b){
      b.classList.toggle('active', b.dataset.fontId === id);
    });
  }

  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    localStorage.setItem('theme', t);
    var icon = document.querySelector('.theme-icon');
    if (icon) icon.textContent = t === 'dark' ? '🌙' : '☀️';
    document.querySelectorAll('.theme-card').forEach(function(c){
      c.classList.toggle('active', c.dataset.themeVal === t);
    });
  }

  // Init
  applyScale(scale);
  applyFont(font);
  applyTheme(localStorage.getItem('theme') || 'dark');

  // Scale buttons
  document.getElementById('scaleMinus').addEventListener('click', function(){
    scale = Math.max(MIN, scale - STEP); applyScale(scale);
  });
  document.getElementById('scalePlus').addEventListener('click', function(){
    scale = Math.min(MAX, scale + STEP); applyScale(scale);
  });

  // Scale presets
  document.querySelectorAll('.scale-preset').forEach(function(b){
    b.addEventListener('click', function(){
      scale = parseInt(b.dataset.val); applyScale(scale);
    });
  });

  // Font items
  document.querySelectorAll('.font-item').forEach(function(b){
    b.addEventListener('click', function(){ applyFont(b.dataset.fontId); });
  });

  // Theme cards
  document.querySelectorAll('.theme-card').forEach(function(c){
    c.addEventListener('click', function(){ applyTheme(c.dataset.themeVal); });
  });

  // Reset
  document.getElementById('resetBtn').addEventListener('click', function(){
    scale = 100; font = 'default';
    localStorage.removeItem(SCALE_KEY);
    localStorage.removeItem(FONT_KEY);
    applyScale(100); applyFont('default');
    applyTheme('dark');
  });
})();
</script>
