<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пиксель Баттл — МапДев Вики</title>
  <link rel="icon" type="image/png" href="fav.png">
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { overflow: hidden !important; height: 100%; margin: 0; }

    #pbViewport {
      position: fixed;
      top: var(--hh); left: 0; right: 0; bottom: 0;
      background: #111118;
      touch-action: none;
      /* cursor set by JS */
    }

    /* The display canvas fills the viewport */
    #pbDisplay {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* HUD pieces */
    .pb-hud-top {
      position: fixed; top: calc(var(--hh) + 8px);
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px;
      background: rgba(14,14,18,.88); border: 1px solid var(--border);
      border-radius: 30px; padding: 6px 16px;
      z-index: 200; backdrop-filter: blur(8px);
    }
    .pb-hud-title { font-family:var(--font); font-size:13px; color:var(--text); letter-spacing:.06em; }
    .pb-admin-badge { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:#ff9020; border:1px solid rgba(255,144,32,.4); border-radius:3px; padding:2px 7px; }
    .pb-online-badge { font-size:11px; color:var(--text2); display:flex; align-items:center; gap:5px; }
    .pb-online-dot { width:7px; height:7px; border-radius:50%; background:#44ff88; box-shadow:0 0 5px #44ff88; animation:onlinePulse 1.5s ease-in-out infinite; }
    @keyframes onlinePulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .pb-back-btn {
      position:fixed; top:calc(var(--hh)+8px); left:14px;
      font-family:var(--font); font-size:12px; color:var(--text2);
      text-decoration:none; padding:7px 14px;
      background:rgba(14,14,18,.88); border:1px solid var(--border);
      border-radius:var(--radius); z-index:200; backdrop-filter:blur(8px);
      transition:color .15s, border-color .15s;
    }
    .pb-back-btn:hover { color:var(--accent); border-color:var(--border2); }

    .pb-hud-bottom {
      position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:7px;
      z-index:200;
    }
    .pb-palette-row {
      display:flex; gap:5px; flex-wrap:wrap; justify-content:center;
      background:rgba(14,14,18,.88); border:1px solid var(--border);
      border-radius:12px; padding:8px 12px;
      backdrop-filter:blur(8px); max-width:90vw;
    }
    .pb-col { width:24px; height:24px; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:transform .12s,border-color .12s; flex-shrink:0; }
    .pb-col.active { border-color:#fff; transform:scale(1.3); }

    .pb-brush-row {
      display:flex; align-items:center; gap:8px;
      background:rgba(14,14,18,.88); border:1px solid var(--border);
      border-radius:20px; padding:5px 14px; backdrop-filter:blur(8px);
    }
    .pb-brush-label { font-size:11px; color:var(--text2); font-family:var(--font); }
    .pb-brush-btn { width:26px; height:26px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:border-color .15s; }
    .pb-brush-btn:hover { border-color:var(--border2); }
    .pb-brush-val { font-size:13px; color:var(--accent); font-family:var(--font); min-width:20px; text-align:center; }

    .pb-cd-row {
      display:flex; align-items:center; gap:8px;
      background:rgba(14,14,18,.88); border:1px solid var(--border);
      border-radius:20px; padding:5px 14px; backdrop-filter:blur(8px); min-width:200px;
    }
    .pb-cd-bar-outer { flex:1; height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; }
    .pb-cd-bar-inner { height:100%; background:var(--accent); border-radius:3px; }
    .pb-cd-label { font-size:11px; color:var(--text2); font-family:var(--font); min-width:50px; text-align:right; white-space:nowrap; }

    .pb-info-row {
      display:flex; gap:12px; align-items:center;
      font-size:11px; color:var(--text2); font-family:var(--font);
      background:rgba(14,14,18,.75); border-radius:20px;
      padding:4px 14px; border:1px solid var(--border);
    }

    .pb-zoom-col {
      position:fixed; right:14px; top:50%; transform:translateY(-50%);
      display:flex; flex-direction:column; gap:6px; z-index:200;
    }
    .pb-zoom-btn { width:36px; height:36px; background:rgba(14,14,18,.88); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:border-color .15s,transform .12s; backdrop-filter:blur(8px); }
    .pb-zoom-btn:hover { border-color:var(--border2); transform:scale(1.1); }
    .pb-zoom-val { font-size:10px; color:var(--text2); text-align:center; font-family:var(--font); }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-logo">
    <img src="medele.png" alt="logo" class="logo-img">
    <a href="main.html" class="logo-text" style="text-decoration:none;color:var(--text);"
       data-default="МапДев Вики" data-hover="кто кто?">МапДев Вики</a>
  </div>
  <nav class="header-nav">
    <a href="authors.html" class="nav-btn" data-sound>Авторы</a>
    <a href="bloggers.html" class="nav-btn" data-sound>Блогеры</a>
    <a href="studios.html"  class="nav-btn" data-sound>Студии</a>
    <a href="events.html"   class="nav-btn" data-sound>Ивенты</a>
  </nav>
  <button class="theme-toggle" id="themeToggle" data-sound><span class="theme-icon">🌙</span></button>
</header>

<div id="pbViewport">
  <canvas id="pbDisplay"></canvas>
</div>

<div class="pb-hud-top">
  <span class="pb-hud-title">🎨 Пиксель Баттл</span>
  <span id="pbAdminBadge" class="pb-admin-badge" style="display:none;">ADMIN · без КД</span>
  <span class="pb-online-badge">
    <span class="pb-online-dot"></span>
    <span id="pbOnline">…</span> онлайн
  </span>
</div>

<a href="main.html" class="pb-back-btn">← Назад</a>

<div class="pb-hud-bottom">
  <div class="pb-brush-row" id="pbBrushRow" style="display:none;">
    <span class="pb-brush-label">Кисть:</span>
    <button class="pb-brush-btn" id="brushDown">−</button>
    <span class="pb-brush-val" id="brushVal">1</span>
    <button class="pb-brush-btn" id="brushUp">+</button>
  </div>
  <div class="pb-palette-row" id="pbPalette"></div>
  <div class="pb-cd-row">
    <div class="pb-cd-bar-outer"><div class="pb-cd-bar-inner" id="cdBar" style="width:100%"></div></div>
    <div class="pb-cd-label" id="cdLabel">● готово</div>
  </div>
  <div class="pb-info-row">
    <span id="pbCoords">x:— y:—</span>
    <span id="pbZoomInfo">4×</span>
    <span style="opacity:.5">ПКМ/средняя = перемещение · колёсико = зум</span>
  </div>
</div>

<div class="pb-zoom-col">
  <button class="pb-zoom-btn" id="zoomIn">+</button>
  <div class="pb-zoom-val" id="zoomVal">4×</div>
  <button class="pb-zoom-btn" id="zoomOut">−</button>
  <button class="pb-zoom-btn" id="zoomReset" title="Сбросить" style="font-size:12px;">⌂</button>
</div>

<audio id="galochkaAudio" src="galochka.mp3" preload="auto"></audio>
<script src="script.js"></script>
<script src="firebase-wiki.js"></script>
<script>
(function () {
  'use strict';

  /* ── Config ── */
  var COLS  = 100, ROWS = 100;
  var CD_MS = 15000;
  var PALETTE = [
    '#ff4060','#ff6040','#ff9020','#ffb800','#ffe066',
    '#b8ff40','#60ff60','#20e080','#40c8ff','#2060ff',
    '#8040ff','#c080ff','#ff40c0','#ff80b0','#ffffff',
    '#cccccc','#888899','#445566','#222233','#000000',
    '#80ffcc','#ff8040','#40ffff','#ff4040','#40ff80'
  ];

  var isAdmin = sessionStorage.getItem('admAuth') === '1';
  if (isAdmin) {
    document.getElementById('pbAdminBadge').style.display = 'inline';
    document.getElementById('pbBrushRow').style.display   = 'flex';
  }

  /* ════════════════════════════════════════════════
     OFFSCREEN: the true grid, 1px per cell
  ════════════════════════════════════════════════ */
  var offscreen = document.createElement('canvas');
  offscreen.width  = COLS;
  offscreen.height = ROWS;
  var off = offscreen.getContext('2d');

  var grid = [];
  (function initGrid() {
    off.fillStyle = '#222233';
    off.fillRect(0, 0, COLS, ROWS);
    for (var r = 0; r < ROWS; r++) { grid[r] = []; for (var c = 0; c < COLS; c++) grid[r][c] = '#222233'; }
  })();

  function setCell(r, c, color) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    grid[r][c] = color;
    off.fillStyle = color;
    off.fillRect(c, r, 1, 1);
  }

  /* ════════════════════════════════════════════════
     DISPLAY CANVAS — renders offscreen + grid lines + cursor
  ════════════════════════════════════════════════ */
  var display  = document.getElementById('pbDisplay');
  var dctx     = display.getContext('2d');
  var viewport = document.getElementById('pbViewport');

  /* View state — panX/panY = pixel offset of grid origin in display coords */
  var scale = 4;
  var panX  = 0, panY = 0;

  function resizeDisplay() {
    display.width  = viewport.clientWidth;
    display.height = viewport.clientHeight;
    redraw();
  }

  var hoverC = -1, hoverR = -1;

  function redraw() {
    var W = display.width, H = display.height;
    dctx.clearRect(0, 0, W, H);

    /* background */
    dctx.fillStyle = '#111118';
    dctx.fillRect(0, 0, W, H);

    /* draw offscreen scaled to display */
    dctx.imageSmoothingEnabled = false;
    dctx.drawImage(offscreen,
      0, 0, COLS, ROWS,
      panX, panY, COLS * scale, ROWS * scale);

    /* grid lines when zoomed in enough */
    if (scale >= 6) {
      dctx.strokeStyle = 'rgba(0,0,0,0.25)';
      dctx.lineWidth   = 0.5;
      /* vertical */
      for (var c = 0; c <= COLS; c++) {
        var x = panX + c * scale;
        dctx.beginPath(); dctx.moveTo(x, panY); dctx.lineTo(x, panY + ROWS * scale); dctx.stroke();
      }
      /* horizontal */
      for (var r = 0; r <= ROWS; r++) {
        var y = panY + r * scale;
        dctx.beginPath(); dctx.moveTo(panX, y); dctx.lineTo(panX + COLS * scale, y); dctx.stroke();
      }
    }

    /* cursor highlight */
    var bs = isAdmin ? brushSize : 1;
    if (hoverC >= 0 && hoverR >= 0 && hoverC < COLS && hoverR < ROWS) {
      var cx = panX + hoverC * scale;
      var cy = panY + hoverR * scale;
      dctx.strokeStyle = 'rgba(255,255,255,0.9)';
      dctx.lineWidth   = Math.max(1, scale / 8);
      dctx.shadowColor = 'rgba(0,0,0,0.8)';
      dctx.shadowBlur  = 3;
      dctx.strokeRect(cx + 0.5, cy + 0.5, bs * scale - 1, bs * scale - 1);
      dctx.shadowBlur  = 0;
    }
  }

  /* zoom label */
  function updateLabel() {
    var txt = scale >= 1
      ? (Number.isInteger(scale) ? scale + '×' : scale.toFixed(1) + '×')
      : (1 / scale).toFixed(1) + '×';
    document.getElementById('zoomVal').textContent    = txt;
    document.getElementById('pbZoomInfo').textContent = txt;
  }

  function centreView() {
    panX = (display.width  - COLS * scale) / 2;
    panY = (display.height - ROWS * scale) / 2;
    redraw(); updateLabel();
  }

  window.addEventListener('resize', function () { resizeDisplay(); });
  resizeDisplay();
  setTimeout(centreView, 0); /* after layout */

  /* ════════════════════════════════════════════════
     COORDINATE CONVERSION
     displayX/displayY → grid col/row
  ════════════════════════════════════════════════ */
  function toCell(dispX, dispY) {
    return {
      c: Math.floor((dispX - panX) / scale),
      r: Math.floor((dispY - panY) / scale)
    };
  }

  /* Get display coords from a mouse/touch event */
  function evXY(e) {
    var rect = display.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  function touchXY(touch) {
    var rect = display.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  /* ════════════════════════════════════════════════
     PALETTE
  ════════════════════════════════════════════════ */
  var selectedColor = PALETTE[0];
  var brushSize     = 1;
  var paletteEl     = document.getElementById('pbPalette');

  PALETTE.forEach(function (col) {
    var btn = document.createElement('div');
    btn.className = 'pb-col' + (col === selectedColor ? ' active' : '');
    btn.style.background = col;
    btn.addEventListener('click', function () {
      selectedColor = col;
      paletteEl.querySelectorAll('.pb-col').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
    });
    paletteEl.appendChild(btn);
  });

  document.getElementById('brushUp').addEventListener('click', function () {
    if (brushSize < 10) { brushSize++; document.getElementById('brushVal').textContent = brushSize; redraw(); }
  });
  document.getElementById('brushDown').addEventListener('click', function () {
    if (brushSize > 1) { brushSize--; document.getElementById('brushVal').textContent = brushSize; redraw(); }
  });

  /* ════════════════════════════════════════════════
     ZOOM
  ════════════════════════════════════════════════ */
  var MIN_S = 1, MAX_S = 64;

  function zoomTo(newScale, pivDispX, pivDispY) {
    newScale = Math.max(MIN_S, Math.min(MAX_S, newScale));
    var ratio = newScale / scale;
    panX = pivDispX - ratio * (pivDispX - panX);
    panY = pivDispY - ratio * (pivDispY - panY);
    scale = newScale;
    redraw(); updateLabel();
  }

  display.addEventListener('wheel', function (e) {
    e.preventDefault();
    var xy = evXY(e);
    var factor = e.deltaY < 0 ? 1.2 : 1 / 1.2;
    zoomTo(scale * factor, xy.x, xy.y);
  }, { passive: false });

  var cx = function() { return display.width / 2; };
  var cy = function() { return display.height / 2; };
  document.getElementById('zoomIn').addEventListener('click',  function () { zoomTo(scale * 2,   cx(), cy()); });
  document.getElementById('zoomOut').addEventListener('click', function () { zoomTo(scale / 2,   cx(), cy()); });
  document.getElementById('zoomReset').addEventListener('click', function () { scale = 4; centreView(); });

  /* ════════════════════════════════════════════════
     PAN  (right-click or middle-click drag)
  ════════════════════════════════════════════════ */
  var panning = false, panPivX = 0, panPivY = 0, panPivPX = 0, panPivPY = 0;

  display.addEventListener('mousedown', function (e) {
    if (e.button === 1 || e.button === 2) {
      e.preventDefault();
      panning = true;
      panPivX = e.clientX; panPivY = e.clientY;
      panPivPX = panX; panPivPY = panY;
      display.style.cursor = 'grabbing';
    }
  });
  window.addEventListener('mousemove', function (e) {
    if (panning) {
      panX = panPivPX + (e.clientX - panPivX);
      panY = panPivPY + (e.clientY - panPivY);
      redraw();
    }
  });
  window.addEventListener('mouseup', function (e) {
    if (e.button === 1 || e.button === 2) {
      panning = false;
      display.style.cursor = 'crosshair';
    }
  });
  display.addEventListener('contextmenu', function (e) { e.preventDefault(); });

  /* Touch pan + pinch */
  var tStart = null;
  display.addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      tStart = {
        t0x: e.touches[0].clientX, t0y: e.touches[0].clientY,
        t1x: e.touches[1].clientX, t1y: e.touches[1].clientY,
        panX: panX, panY: panY, scale: scale
      };
    }
  }, { passive: false });
  display.addEventListener('touchmove', function (e) {
    if (e.touches.length === 2 && tStart) {
      e.preventDefault();
      var rect   = display.getBoundingClientRect();
      var midX   = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      var midY   = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      var startD = Math.hypot(tStart.t1x - tStart.t0x, tStart.t1y - tStart.t0y);
      var nowD   = Math.hypot(e.touches[1].clientX - e.touches[0].clientX,
                              e.touches[1].clientY - e.touches[0].clientY);
      var ns     = Math.max(MIN_S, Math.min(MAX_S, tStart.scale * nowD / startD));
      var ratio  = ns / tStart.scale;
      var sMidX  = (tStart.t0x + tStart.t1x) / 2 - rect.left;
      var sMidY  = (tStart.t0y + tStart.t1y) / 2 - rect.top;
      panX  = midX - ratio * (sMidX - tStart.panX);
      panY  = midY - ratio * (sMidY - tStart.panY);
      scale = ns;
      redraw(); updateLabel();
    }
  }, { passive: false });
  display.addEventListener('touchend', function (e) { if (e.touches.length < 2) tStart = null; });

  /* ════════════════════════════════════════════════
     DRAWING
  ════════════════════════════════════════════════ */
  var lastPaint  = 0;   /* локальный кэш для UI */
  var cdChecking = false;
  var painting   = false;

  function tryPaint(dispX, dispY) {
    var pos = toCell(dispX, dispY);
    var bs  = isAdmin ? brushSize : 1;

    var toWrite = [];
    for (var dr = 0; dr < bs; dr++) {
      for (var dc = 0; dc < bs; dc++) {
        var r = pos.r + dr, c = pos.c + dc;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
        if (grid[r][c] === selectedColor) continue;
        toWrite.push({ r: r, c: c });
      }
    }
    if (!toWrite.length) return;

    if (isAdmin) {
      toWrite.forEach(function (p) {
        setCell(p.r, p.c, selectedColor);
        if (window.WikiDB) window.WikiDB.db.ref('pixelbattle/' + p.r + '_' + p.c).set(selectedColor);
      });
      redraw();
      return;
    }

    /* Быстрая локальная проверка — не идём в Firebase если точно в КД */
    if (Date.now() - lastPaint < CD_MS) return;
    if (cdChecking) return;

    /* Проверяем КД в Firebase */
    cdChecking = true;
    function waitDB(cb) { if (window.WikiDB) cb(); else setTimeout(function(){ waitDB(cb); }, 200); }
    waitDB(function() {
      window.WikiDB.checkCooldown('pixelbattle', CD_MS, function (remaining) {
        cdChecking = false;
        if (remaining > 0) {
          /* Синхронизируем локальный кэш */
          lastPaint = Date.now() - (CD_MS - remaining);
          return;
        }
        window.WikiDB.stampCooldown('pixelbattle');
        lastPaint = Date.now();
        toWrite.forEach(function (p) {
          setCell(p.r, p.c, selectedColor);
          window.WikiDB.db.ref('pixelbattle/' + p.r + '_' + p.c).set(selectedColor);
        });
        redraw();
      });
    });
  }

  /* Mouse */
  display.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    painting = true;
    var xy = evXY(e);
    tryPaint(xy.x, xy.y);
  });
  window.addEventListener('mousemove', function (e) {
    if (panning) return; /* don't update hover while panning */
    var xy   = evXY(e);
    var cell = toCell(xy.x, xy.y);
    hoverC = cell.c; hoverR = cell.r;
    var inBounds = cell.c >= 0 && cell.c < COLS && cell.r >= 0 && cell.r < ROWS;
    document.getElementById('pbCoords').textContent = inBounds ? 'x:' + cell.c + ' y:' + cell.r : 'x:— y:—';
    if (painting) tryPaint(xy.x, xy.y);
    else redraw(); /* redraw cursor */
  });
  window.addEventListener('mouseup', function (e) { if (e.button === 0) painting = false; });
  display.addEventListener('mouseleave', function () {
    hoverC = -1; hoverR = -1; painting = false; redraw();
  });

  /* Touch draw (single finger) */
  display.addEventListener('touchstart', function (e) {
    if (e.touches.length !== 1) return;
    e.preventDefault();
    painting = true;
    var xy = touchXY(e.touches[0]);
    tryPaint(xy.x, xy.y);
  }, { passive: false });
  display.addEventListener('touchmove', function (e) {
    if (e.touches.length !== 1 || !painting) return;
    e.preventDefault();
    var xy = touchXY(e.touches[0]);
    tryPaint(xy.x, xy.y);
  }, { passive: false });
  display.addEventListener('touchend', function () { painting = false; });

  /* ════════════════════════════════════════════════
     COOLDOWN UI
  ════════════════════════════════════════════════ */
  var cdBar   = document.getElementById('cdBar');
  var cdLabel = document.getElementById('cdLabel');
  setInterval(function () {
    if (isAdmin) { cdBar.style.width = '100%'; cdLabel.textContent = '● ADMIN'; cdLabel.style.color = '#ff9020'; return; }
    var diff = Date.now() - lastPaint;
    if (diff >= CD_MS) {
      cdBar.style.width = '100%';
      cdLabel.textContent = '● готово';
      cdLabel.style.color = '#44ff88';
    } else {
      cdBar.style.width = (diff / CD_MS * 100).toFixed(1) + '%';
      cdLabel.textContent = Math.ceil((CD_MS - diff) / 1000) + 'с';
      cdLabel.style.color = '';
    }
  }, 80);

  /* ════════════════════════════════════════════════
     FIREBASE SYNC
  ════════════════════════════════════════════════ */
  function waitDB(cb) { if (window.WikiDB) cb(); else setTimeout(function () { waitDB(cb); }, 300); }

  waitDB(function () {
    var db = window.WikiDB.db;

    /* Синхронизируем lastPaint из Firebase при старте */
    if (!isAdmin) {
      window.WikiDB.checkCooldown('pixelbattle', CD_MS, function(remaining) {
        if (remaining > 0) lastPaint = Date.now() - (CD_MS - remaining);
      });
    }

    var onRef = db.ref('pb_online').push();
    onRef.set(true);
    onRef.onDisconnect().remove();
    db.ref('pb_online').on('value', function (snap) {
      document.getElementById('pbOnline').textContent = snap.numChildren();
    });

    db.ref('pixelbattle').once('value', function (snap) {
      if (!snap.exists()) return;
      snap.forEach(function (ch) {
        var p = ch.key.split('_'), r = +p[0], c = +p[1];
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) setCell(r, c, ch.val());
      });
      redraw();
    });

    db.ref('pixelbattle').on('child_changed', function (snap) {
      var p = snap.key.split('_'), r = +p[0], c = +p[1];
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) { setCell(r, c, snap.val()); redraw(); }
    });
    db.ref('pixelbattle').on('child_added', function (snap) {
      var p = snap.key.split('_'), r = +p[0], c = +p[1];
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) { setCell(r, c, snap.val()); redraw(); }
    });
    db.ref('pixelbattle').on('child_removed', function (snap) {
      var p = snap.key.split('_'), r = +p[0], c = +p[1];
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) { setCell(r, c, '#222233'); redraw(); }
    });
  });

})();
</script>
</body>
</html>
