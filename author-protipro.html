<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProTiPro — МапДев Вики</title>
  <link rel="icon" type="image/jpeg" href="fav.jpg">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    /* random gears + books layer */
    .deco-layer {
      position: fixed; inset: 0; z-index: -1;
      pointer-events: none; overflow: hidden;
    }
    .deco-item {
      position: absolute;
      font-size: 32px;
      opacity: .045;
      user-select: none;
      animation: decoSpin linear infinite;
    }
    @keyframes decoSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .article-wrap { padding-top:var(--hh);max-width:820px;margin:0 auto;padding:calc(var(--hh) + 32px) 36px 100px; }
    .article-hero { display:flex;align-items:center;gap:26px;padding-bottom:28px;opacity:0;animation:fadeUp .7s ease forwards; }
    .article-avatar { width:88px;height:88px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid rgba(160,160,200,.5);box-shadow:0 0 28px rgba(130,130,200,.3); }
    .article-title { font-family:'Bebas Neue','Impact',sans-serif;font-size:clamp(32px,6vw,54px);letter-spacing:.06em;background:linear-gradient(90deg,#c0c0d8,#8888b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .article-subtitle { font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:7px; }
    .article-divider { height:1px;background:linear-gradient(90deg,#a0a0c0,#6060a0);opacity:.35;margin:0 0 34px; }
    .article-body { font-size:12px;color:rgba(210,210,240,.78);line-height:1.95;opacity:0;animation:fadeUp .7s ease .25s forwards; }
    .article-links { margin-top:44px;display:flex;flex-direction:column;gap:14px;opacity:0;animation:fadeUp .7s ease .4s forwards; }
    .links-label { font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(160,160,210,.7);margin-bottom:2px; }
    .map-link-card { display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.04);border:1px solid rgba(160,160,200,.2);border-radius:10px;padding:14px 18px;text-decoration:none;color:var(--text);transition:all .15s; }
    .map-link-card:hover { background:rgba(160,160,200,.08);border-color:rgba(160,160,200,.5);transform:translateX(4px);box-shadow:0 0 20px rgba(130,130,200,.15); }
    .map-thumb { width:80px;height:45px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid rgba(255,255,255,.1); }
    .map-title { font-size:12px;color:#fff;margin-bottom:3px; }
    .map-url { font-size:9px;color:rgba(160,160,200,.7);letter-spacing:.04em; }
    .map-arrow { margin-left:auto;font-size:16px;color:rgba(160,160,200,.5);transition:transform .15s,color .15s; }
    .map-link-card:hover .map-arrow { transform:translateX(4px);color:#a0a0d0; }
    .social-row { display:flex;gap:10px;flex-wrap:wrap;margin-top:6px; }
    .social-btn { display:inline-flex;align-items:center;gap:8px;font-family:var(--font);font-size:11px;letter-spacing:.06em;padding:9px 16px;border-radius:6px;border:1px solid rgba(255,255,255,.12);color:rgba(210,210,240,.8);text-decoration:none;background:rgba(255,255,255,.04);transition:all .15s; }
    .social-btn:hover { border-color:rgba(160,160,200,.55);background:rgba(160,160,200,.1);color:#fff;transform:scale(1.05); }
    .social-btn svg { width:16px;height:16px;fill:currentColor;flex-shrink:0; }
    .back-link { display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-size:11px;letter-spacing:.07em;color:rgba(255,255,255,.3);text-decoration:none;margin-top:56px;transition:color .15s; }
    .back-link:hover { color:#a0a0d0; }
    @media(max-width:600px){.article-wrap{padding-left:18px;padding-right:18px;}.article-hero{flex-direction:column;align-items:flex-start;}}
  </style>
</head>
<body>

<!-- scattered gears + books -->
<div class="deco-layer" id="decoLayer"></div>

<header class="site-header">
  <div class="header-logo">
    <img src="medele.png" alt="logo" class="logo-img" id="logoImg">
    <span class="logo-text" id="logoText" data-default="МапДев Вики" data-hover="кто кто?">МапДев Вики</span>
  </div>
  <nav class="header-nav">
    <a href="authors.html" class="nav-btn" data-sound>Авторы</a>
    <a href="bloggers.html" class="nav-btn" data-sound>Блогеры</a>
    <a href="studios.html" class="nav-btn" data-sound>Студии</a>
  </nav>
  <button class="theme-toggle" id="themeToggle" data-sound><span class="theme-icon">🌙</span></button>
</header>

<div class="article-wrap">
  <div class="article-hero">
    <img src="protipro.jpg" class="article-avatar" alt="ProTiPro">
    <div>
      <h1 class="article-title">ProTiPro</h1>
      <p class="article-subtitle">Автор &nbsp;·&nbsp; Карты &nbsp;·&nbsp; Датапаки</p>
    </div>
  </div>
  <div class="article-divider"></div>
  <div class="article-body">Доброго времени суток! Я TiPro, маленькая фанатка Майнкрафта и очень крутой картодел! Кажется у меня зависимость от датапаков. Помогите...</div>
  <div class="article-links">
    <div class="links-label">Карты</div>
    <a href="https://minecraft-inside.ru/191758/" target="_blank" class="map-link-card" data-sound>
      <img src="uno.jpg" class="map-thumb" alt="UNO by ProTiPro">
      <div><div class="map-title">UNO by ProTiPro</div><div class="map-url">minecraft-inside.ru</div></div>
      <span class="map-arrow">→</span>
    </a>
    <div class="links-label" style="margin-top:10px">Соцсети</div>
    <div class="social-row">
      <a href="https://t.me/tiproti" target="_blank" class="social-btn" data-sound>
        <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.19 13.982l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.958.577z"/></svg>
        Telegram
      </a>
    </div>
  </div>
  <a href="authors.html" class="back-link" data-sound>← Назад к авторам</a>
</div>

<audio id="galochkaAudio" src="galochka.mp3" preload="auto"></audio>
<script src="script.js"></script>
<script>
/* scatter random gears ⚙ and books 📖 */
(function(){
  var layer = document.getElementById('decoLayer');
  if(!layer) return;
  var icons = ['⚙','⚙','⚙','📖','⚙','📖','⚙','⚙','📖'];
  var placed = [];
  for(var i=0;i<22;i++){
    var el = document.createElement('span');
    el.className = 'deco-item';
    var sym = icons[Math.floor(Math.random()*icons.length)];
    el.textContent = sym;
    var x = 3+Math.random()*94;
    var y = 2+Math.random()*96;
    var sz = 24+Math.random()*36;
    var dur = sym==='⚙' ? (8+Math.random()*20)+'s' : 'none';
    el.style.cssText = 'left:'+x+'vw;top:'+y+'vh;font-size:'+sz+'px;animation-duration:'+dur;
    if(sym==='📖') el.style.animation='none';
    layer.appendChild(el);
  }
})();
</script>
</body>
</html>
